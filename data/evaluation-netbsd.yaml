  C3d.1:
    P: 1
    D: 2
    S: 2
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "kern.expose_address sysctl (0/1/2; default 1 for GENERIC)"
      - "kern.securelevel (restricts /dev/kmem writes at >= 1)"
      source_files:
      - "sys/kern/init_sysctl.c"
      - "sys/kern/kern_descrip.c"
