        All FreeRTOS kernel control structures — the TCB list,
        ready/delayed/suspended lists, queue/semaphore objects allocated through
        pvPortMalloc, and xMPU_SETTINGS — sit inside the privileged-RAM linker
        region. The MPU's privileged-RAM region (PRIV_RW only) means
        unprivileged tasks cannot read or write any of this state; they only see
        their own task RAM and the unprivileged-flash code. This is the
        structural analogue of CONFIG_THREAD_INFO_IN_TASK + per-CPU-area
        isolation, achieved by MPU privilege rather than by
        KASLR-of-task_struct.
    commits:
    - hash: "ce576f368"
