  C5d.1:
    P: 1
    D: 1
    S: 1
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options: []
      source_files:
      - "sources/freertos/tasks.c (the scheduler proper — scheduling, idle task, task lifecycle)"
      - "sources/freertos/queue.c (queues + the message-passing primitive that doubles as semaphores/mutexes)"
      - "sources/freertos/list.c (intrusive lists used for ready/delayed/blocked task tracking)"
      - "sources/freertos/timers.c (software timer service task)"
      - "sources/freertos/event_groups.c + sources/freertos/stream_buffer.c (additional in-kernel IPC primitives)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (the MPU wrapper layer — itself part of the kernel, not a separate service)"
      default_state: >-
        The 'kernel' is reduced to scheduling, lists, queues, timers, and the
        MPU SVC dispatch — a code base under 10 KSLOC of C. By that line count
        the FreeRTOS scheduler core is one of the smallest in the evaluation
        set, comparable to Fiasco's microkernel proper. But unlike a true
        microkernel, FreeRTOS does not run the rest of the system (drivers, TCP
        stack, file system) in separate protection domains: those components are
        compiled and linked into the same privileged image as ordinary C objects
        and share the kernel's address space. The MPU sandbox only separates
        *application tasks* from the privileged image; it does not separate the
        TCP/IP task from the scheduler, and there is no IPC mechanism between
        protection domains besides direct C calls through the MPU SVC wrappers.
    commits:
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: the scheduler-vs-rest separation in source-tree structure is
      real — the kernel proper is genuinely a small set of files under
      sources/freertos/{tasks,queue,list,timers,event_groups,stream_buffer}.c,
      with everything else (FreeRTOS-Plus-*, drivers, vendor HALs) shipped
      as external repositories. D=1: there is no enforcement mechanism that
      keeps services architecturally separate — an integrator who links
      FreeRTOS-Plus-TCP and a vendor I2C driver into the same binary gets a
      monolithic image, and that is the default workflow the documentation
      describes. S=1: 'small TCB' is a real defensive property (less code,
      fewer bugs), but a successful exploit anywhere inside the privileged
      image touches the scheduler's data structures immediately because
      they all share the same address space. A=2: the small-kernel design
      is an intentional choice of the project (in-tree, stable for many
      years) but is not architecturally enforced the way a microkernel's
      task-per-service model is. T_age=3 / T_maintained=3 → T=3: the
      file-level decomposition has been stable for over a decade. The
      honest summary is that FreeRTOS is a small-kernel system but not a
      microkernel, and the C5d.1 score reflects that gap.
  C5d.2:
    P: 1
    D: 1
    S: 2
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition)"
      - "configENABLE_ACCESS_CONTROL_LIST (default 0 — when 1, per-task allow-list of kernel-object handles)"
      - "configUSE_MPU_WRAPPERS_V1=0 (v2 wrappers required for the per-task ACL bitmap and per-task syscall stack)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c (prvSetupMPU programs per-task RAM as RW+XN and kernel RAM as PRIV_RW; on context switch the previous task's regions are replaced wholesale, so a compromised task cannot see the next task's regions)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (vGrantAccessToKernelObject + ulAccessControlList[] bitmap: a compromised task that holds a TaskHandle_t / QueueHandle_t still has to pass the per-task ACL check inside each MPU_xFoo wrapper before the kernel acts on the handle)"
      - "sources/freertos/tasks.c (TCB_t holds xMPU_SETTINGS — including ulAccessControlList[] when the feature is enabled — so the per-task isolation state travels with the task, not with the global kernel)"
      - "sources/freertos/include/FreeRTOS.h:83-85 (configENABLE_ACCESS_CONTROL_LIST default 0)"
      default_state: >-
        An unprivileged task on the FreeRTOS-MPU posture is confined to (a) its
        own task RAM region (RW+XN), (b) any extra MemoryRegion_t entries
        supplied at xTaskCreateRestricted time, and (c) the bounded SVC-dispatch
        syscall surface analysed in C4.3/C4.8. A successful corruption inside
        one such task cannot read or write another task's RAM and (with the ACL
        on) cannot operate on kernel-object handles it does not own — the
        analogue of preventing lateral movement between unprivileged components.
        Inside the privileged image, however, there are no compartments: a
        kernel-mode bug in any privileged code path (interrupt handler, MPU
        wrapper itself, FreeRTOS-Plus-TCP if statically linked privileged, any
        vendor HAL) reaches everywhere immediately.
    commits:
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    - hash: "170a291d4"
      date: "2023"
      description: "Add Access Control List to MPU ports (#765)"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/765"
    rationale: |
      P=1: lateral-movement containment between unprivileged tasks is a
      real, hardware-enforced property of the FreeRTOS-MPU posture. D=1:
      MPU itself defaults to off; the ACL bitmap defaults to off
      (configENABLE_ACCESS_CONTROL_LIST=0); and the property only holds at
      the unprivileged-task level — so on the headline default posture
      (flat, no MPU, every task privileged) nothing constrains lateral
      movement at all. S=2 (one level above C5d.1's S=1 because there is
      actual hardware enforcement, not just code-size minimalism, but
      still capped because the privileged domain remains undivided): an
      unprivileged-task compromise is genuinely contained — MPU traps any
      out-of-region access, the ACL bitmap blocks unauthorised handle
      operations, and the per-task syscall stack prevents one task's
      privileged-side execution from clobbering another's — but a
      privileged-mode compromise reaches everywhere. A=3: per-task MPU
      regions, the ulAccessControlList[] bitmap, and the per-task syscall
      stack are all foundational mechanisms of the MPU port and the v2
      wrapper layer, not bolt-ons. T_age=3 / T_maintained=3 → T=3: the MPU
      API, the wrappers, and the ACL extension are long-standing and
      actively maintained. C5c.2 scores the primitive (per-task MPU
      domains); C5d.2 scores how the kernel actually uses it as a lateral-
      movement defence.
  C6.1:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        The FreeRTOS-Kernel ships as portable C sources that the integrator
        links into a single static firmware image. Verification of that
        image (signature check, hash of the vector table, root-of-trust
        anchored in immutable boot ROM) is performed before the kernel
        executes by vendor stacks such as MCUboot, STM32 RDP/RSS, NXP
        HABv4/AHAB, Microchip Secure Boot, or NordicSemi nRF Secure
        Bootloader. The kernel itself contains no UEFI Secure Boot, no
        signature-verification routine, and no kernel-side root-of-trust
        primitive to score.
    commits: []
    discussions: []
    rationale: >-
      P=0: the boot-time tampering surface exists on every MCU deployment,
      and the FreeRTOS distribution ships no verified-boot component — no
      first-party bootloader, no signature verification, no root-of-trust
      integration. Zephyr demonstrates an MCU OS can ship the mechanism
      (CONFIG_BOOTLOADER_MCUBOOT, signed images, first-class west-manifest
      integration), so delegating verification to SoC ROM / vendor stacks is
      an absence of an OS-level mechanism, not inapplicability. D=S=A=T=0
      follow from P=0.
  C6.2:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        The kernel has no Trusted Platform Module or TCG-Storage driver and
        no measured-boot infrastructure (no PCR extend on init, no event
