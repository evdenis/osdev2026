        kernel/app flash from RW+XN RAM. Task RAM is XN both for the task itself
        (cannot execute its own stack/heap) and from privileged mode by virtue
        of the same MPU region. There is no facility to allocate a runtime W+X
        region — the MPU permission bits are fixed at region-configure time and
        FreeRTOS exposes no JIT loader. On the no-MPU posture, all of RAM is
        implicitly XN only if the Cortex-M memory map's default permissions say
        so (SRAM is XN by default on Armv8-M); kernel code stays RO+X because it
