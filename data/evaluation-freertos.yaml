        ROM is responsible for hashing each stage and reporting it to an
        external attestation back-end (e.g. AWS IoT Device Defender,
        Azure DPS, or an on-die TrustZone-M secure partition); none of
        that lives in the FreeRTOS-Kernel.
    commits: []
    discussions: []
    rationale: >-
      P=0: the measurement/attestation surface exists (firmware integrity
      claims matter on any connected MCU), and the FreeRTOS distribution
      ships nothing for it — no measurement at boot, no event log, no
      attestation client. Zephyr scores P=1 here via its TF-M PSA attestation
      integration, proving the mechanism is deliverable by an MCU OS;
      FreeRTOS's delegation to vendor bootloaders is an absence, not
      inapplicability. D=S=A=T=0 follow from P=0.
  C6.3:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS has no loadable-module loader (C4.5 is N/A) and no
        in-kernel attestation client. Remote attestation, where used in
        Cortex-M deployments, is an application-level concern layered on
        TLS (mbedTLS) and platform services such as AWS IoT Device
        Defender, Arm Platform Security Architecture (PSA) attestation
        running in the secure partition, or vendor DICE/RIoT
        implementations in immutable ROM — none of these are kernel
        primitives.
    commits: []
    discussions: []
    rationale: >-
      N/A by construction: no runtime-loaded kernel code to sign and no
