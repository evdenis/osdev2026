      ROM- or application-level service.
  C6.4:
    P: 1
    D: 2
    S: 2
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition; the RO programming is in the configENABLE_MPU guard in port.c)"
      - "configTOTAL_MPU_REGIONS (8 or 16 on Cortex-M33; the 4 background regions consume 4 of these)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:940-944 (prvSetupMPU: privileged-flash region programmed with portMPU_REGION_PRIVILEGED_READ_ONLY using __privileged_functions_start__/__privileged_functions_end__ linker symbols)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:967-974 (prvSetupMPU: privileged-RAM region programmed with portMPU_REGION_PRIVILEGED_READ_WRITE | portMPU_REGION_EXECUTE_NEVER — kernel data cannot be executed)"
      default_state: >-
        On the FreeRTOS-MPU posture (configENABLE_MPU=1, documented default for
        this evaluation), the kernel's own .text section is marked read-only by
        the MPU before the scheduler starts, and the kernel's privileged RAM is
        marked execute-never. A stray privileged-mode write to a kernel-code
        address therefore traps as a MemManage fault, and a stray jump into
        kernel data traps the same way. There is no runtime API to *re-lock*
        these regions or to monotonically raise a protection level: the MPU
        registers remain writable from privileged mode for the life of the
        system, so a privileged-mode arbitrary-write primitive can reprogram the
        MPU and remove the protection. This is the structural equivalent of
        CONFIG_STRICT_KERNEL_RWX without the additional CONFIG_LOCK_DOWN_KERNEL
        / Lockdown-LSM monotonic-securelevel layer; closer in spirit to Linux's
        pre-Lockdown state than to OpenBSD's monotonic kern.securelevel.
    commits:
    - hash: "ce576f368"
      date: "2019"
      description: "First Official Release of ARMV8M Support."
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: the kernel's own .text and RAM are MPU-protected against accidental
      and bug-driven modification at runtime. D=2: enabled by default on the
      documented FreeRTOS-MPU posture but absent on the kernel's own
      configENABLE_MPU=0 default; D is therefore not 3. S=2: hardware-enforced
      against unprivileged tasks and against accidental kernel writes, but the
      MPU remains reprogrammable from privileged mode for the system's life —
      there is no monotonic-securelevel / Lockdown-LSM equivalent that would
      freeze the protection so a kernel-code-execution bug cannot lift it.
      Compared with OpenBSD's monotonic kern.securelevel (S=3) or Linux's
      Lockdown LSM (S=2-3), the FreeRTOS primitive is closer to the bare
      CONFIG_STRICT_KERNEL_RWX layer without the lockdown monotonic. A=2: an
      in-tree configurable feature of the MPU port. T_age=3 / T_maintained=3 →
      T=3: prvSetupMPU's RO-flash region has been part of the Cortex-M MPU
      ports since the MPU port was introduced and is actively maintained.
  C6.5:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
