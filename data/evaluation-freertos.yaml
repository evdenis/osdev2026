    rationale: |
      P=1. D=2: isolation is the default in the MPU posture (the MPU is
      configured with PRIV_RW on privileged RAM before the scheduler starts);
      in flat mode there is no isolation at all. S=2: strong against
      unprivileged tasks, but the TCB still sits in the same heap as other
      privileged allocations, so a kernel-side overflow is not contained — this
      is a step short of, e.g., putting TCBs in a separately-mapped guarded
      region. A=3: architectural property of the port. T=3.
