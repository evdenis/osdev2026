# yaml-language-server: $schema=schema/evaluation.schema.json
# FreeRTOS kernel hardening evaluation.
# Primary target: FreeRTOS-Kernel V11.2.0 on ARMv8-M Cortex-M33 with TrustZone
# and MPU enabled (FreeRTOS-MPU posture); port at portable/GCC/ARM_CM33/
# {secure,non_secure}/. Kernel source at sources/freertos/ (tag V11.2.0).
# Comparators: flat (no-MPU) mode on the same CM33 port; Cortex-M4F port; RISC-V port.
os: freertos
schema_version: 1
default_config: "FreeRTOS-Kernel V11.2.0, ARMv8-M Cortex-M33 + TrustZone + MPU (FreeRTOS-MPU), portable/GCC/ARM_CM33/{secure,non_secure}/, default FreeRTOSConfig.h"
comparator_configs:
- "Flat / no-MPU on Cortex-M33 (portable/GCC/ARM_CM33_NTZ/non_secure/ or MPU disabled)"
- "Cortex-M4F (portable/GCC/ARM_CM4F/), no MPU port available"
- "RISC-V (portable/GCC/RISC-V/), no MPU wrapping"

mechanisms:

  # =========================================================================
  # C1 — Memory Corruption Prevention
  # =========================================================================

  C1a.1:
    P: 1
    D: 1
    S: 2
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configCHECK_FOR_STACK_OVERFLOW (default 0 — opt-in; values 1 and 2 select two different check styles)"
      source_files:
      - "sources/freertos/include/stack_macros.h (taskCHECK_FOR_STACK_OVERFLOW macro; method 1 compares pxTopOfStack against pxStack+portSTACK_LIMIT_PADDING; method 2 also memcmps the last 16 bytes against tskSTACK_FILL_BYTE 0xA5)"
      - "sources/freertos/tasks.c:1846 (memset of new task stack to tskSTACK_FILL_BYTE 0xA5 in prvInitialiseNewTask when method 2 is in use)"
      - "sources/freertos/include/FreeRTOS.h:701-702 (#ifndef configCHECK_FOR_STACK_OVERFLOW → default 0)"
      default_state: >-
        Disabled by default (configCHECK_FOR_STACK_OVERFLOW=0). Integrators must
        set it to 1 or 2 in FreeRTOSConfig.h and provide
        vApplicationStackOverflowHook(). Methods 1 and 2 are guarded by
        `portUSING_MPU_WRAPPERS != 1`, i.e. on MPU ports the macro is empty and
        the MPU/Armv8-M hardware stack-limit register is relied on instead.
    commits:
    - hash: "39f6b0b5d"
      date: "2008-03-03"
      description: "Add stack check macros."
    discussions: []
    rationale: |
      P=1: the kernel ships a stack-overflow detection facility. D=1: it is opt-in
      via configCHECK_FOR_STACK_OVERFLOW, which defaults to 0; on the flagship
      Cortex-M33 MPU port the macro is also bypassed in favour of the Armv8-M
      hardware stack-limit register, so on the MPU posture the on-context-switch
      software check is structurally inert. S=2: method 1 only catches overflow
      that is still detectable at the next context switch (a single function
      blowing past the limit and then returning will be missed); method 2 adds a
      16-byte 0xA5 sentinel at the far end of the stack but is still
      context-switch-bound and can be jumped over by a sufficiently large stride.
      Neither is a per-frame compiler canary; both rely on a hook the application
      must provide. A=2: in-tree, configurable, but layered on top of the
      scheduler rather than woven through the codegen. T=3: the mechanism has
      been part of the kernel for well over a decade (T_age=3) and is actively
      maintained (T_maintained=3).
  C1a.2:
    P: 1
    D: 2
    S: 2
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU (default 0; FreeRTOS-MPU posture sets it to 1)"
      - "configTOTAL_MPU_REGIONS (must be 8 or 16 on Cortex-M33)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:899-986 (prvSetupMPU sets up four background regions: privileged flash RX, unprivileged flash RO, unprivileged syscalls flash RO, privileged RAM RW+XN; per-task regions configured at xTaskCreateRestricted time)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:1211 (xMPU_SETTINGS is the per-TCB MPU-state struct programmed on context switch)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (SVC trampolines that gate access from unprivileged tasks)"
      default_state: >-
        When configENABLE_MPU=1 (the FreeRTOS-MPU posture), per-task stacks are
        wrapped by MPU regions that are unmapped from other tasks: an overrun
        into adjacent task memory or into privileged RAM traps as a MemManage
        fault. The Armv8-M PSPLIM/MSPLIM stack-limit registers provide an
        additional hardware tripwire on the active stack pointer. There is no
        MMU so no true unmapped guard *page*; the protection is the MPU-region
        boundary itself, with no slack region between adjacent regions.
    commits:
    - hash: "4640196be"
      date: "2009-09-28"
      description: "Add CM3 MPU port."
    - hash: "ce576f368"
      date: "2019"
      description: "First Official Release of ARMV8M Support."
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: a guard-equivalent exists in the form of the MPU region boundary
      around each task stack plus the Armv8-M PSPLIM register. D=2: enforced by
      default in the documented MPU posture (configENABLE_MPU=1), but on the
      kernel's own default (configENABLE_MPU=0) and on non-MPU ports the
      mechanism is absent. S=2: traps overruns out of the task stack at the
      hardware level, but adjacent regions touch one another with no unmapped
      "buffer page" between them (only the MPU permission delta), so a precise
      out-of-bounds write that targets the very next valid region within the
      task's own access set is not caught. A=3: this is an architectural
      property of the port, not a bolt-on. T=3: the MPU port has been part of
      FreeRTOS for many years and the v2 wrappers and Armv8-M PSPLIM use are
      actively maintained.
  C1a.3:
    P: 1
    D: 1
    S: 2
    A: 2
    T_age: 2
    T_maintained: 3
    implementation:
      config_options:
      - "portUSING_MPU_WRAPPERS (include/mpu_wrappers.h:34 — gates the wrapper layer; set to 1 only by MPU ports, so the opt-in is choosing an MPU port)"
      - "configUSE_MPU_WRAPPERS_V1 (include/FreeRTOS.h:79-80 — defaults to 0, i.e. the hardened v2 wrappers are the default once an MPU port is selected)"
      - "configENABLE_ACCESS_CONTROL_LIST (include/FreeRTOS.h:84-85 — default 0; per-task kernel-object ACL on top of the always-on buffer validation)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:2014-2065 (xPortIsAuthorizedToAccessBuffer for the primary Cortex-M33 target: dual portIS_ADDRESS_WITHIN_RANGE endpoint checks + portIS_AUTHORIZED permission check + portADD_UINT32_WILL_OVERFLOW guard)"
      - "sources/freertos/portable/GCC/ARM_CM4_MPU/port.c:1513-1559 (same validator for the ARMv7-M/PMSAv7 MPU port)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c:2324 (MPU_xQueueReceiveImpl validates the receive buffer for WRITE against the queue item size)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c:4390,4441 (MPU_xStreamBufferSendImpl / ReceiveImpl validate pvTxData READ / pvRxData WRITE)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c:95-114 (IS_EXTERNAL_INDEX_VALID opaque-handle validation against the protected kernel-object pool)"
      default_state: >-
        Active by default whenever the MPU posture is selected: choosing an MPU
        port (portUSING_MPU_WRAPPERS==1) gets the v2 wrappers automatically
        (configUSE_MPU_WRAPPERS_V1 defaults to 0), and the per-buffer
        range/permission check runs unconditionally inside v2 — there is no
        switch to keep v2 while disabling buffer validation. 19
        buffer-authorization call sites across 15 MPU_*Impl wrappers; 56
        kernel-object-authorization call sites; 138 wrapper entry points total.
        On non-MPU ports (the common default configuration, no privilege split)
        the wrappers compile out entirely.
    commits:
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    - hash: "6f3586516"
      date: "2023-08-08"
      description: "Fix MPU wrapper for vTaskDelete for calling-task deletion (#745) — wrapper-correctness fix in the v2 boundary layer"
    discussions: []
    rationale: |
      P=1: the evaluation's primary target is the MPU posture (Cortex-M33),
      where unprivileged tasks pass buffers to kernel APIs across an SVC
      privilege boundary and FreeRTOS ships exactly the bounds+permission
      validation C1a.3 abstracts — xPortIsAuthorizedToAccessBuffer, the
      structural twin of zephyr's arch_buffer_validate (P=1 there) and
      tock's ProcessBuffer. Syscall-dispatch hardening (separate privileged
      stack, opaque handles) belongs to C4, while buffer-range validation
      at the boundary is scored here; both count in their respective
      categories. D=1: exists only on MPU ports, which
      the integrator must deliberately select (parallel to zephyr's
      CONFIG_USERSPACE gating). S=2: a genuine bounds-plus-permission walk
      per buffer (endpoints within one enabled region, R/W direction checked,
      start+length overflow rejected) — stronger than a null/size check, but
      held below 3 because coverage is per-wrapper (19 sites), not a single
      structural choke point; validation depends on the caller-supplied
      length; and it is a runtime walk, not a type-system guarantee like
      tock's. A=2: in-tree port-layer + Common wrapper infrastructure,
      conditional on the MPU configuration. T_age=2: mpu_wrappers_v2 landed
      2023-07 in V10.6.0 (~3 years). T_maintained=3: actively maintained
      (39 commits in the last 18 months, releases through V11.2.0; the v2
      layer itself received fixes in the window). T=min(2,3)=2.
  C1a.4:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel is delivered as portable C sources without its own build
        system; the integrator's toolchain decides whether _FORTIFY_SOURCE is
        defined and whether libc supplies __memcpy_chk and friends. The kernel
        itself includes no fortified-wrapper headers and has no Kconfig-style
        switch to request them. Cortex-M toolchain libcs (newlib-nano, picolibc)
        generally do not provide the _chk variants in their default footprint.
    commits: []
    discussions: []
    rationale: |
      P=0: the surface exists (the kernel is C and calls memcpy/strncpy-class
      functions with compile-time-known sizes), but no FORTIFY instrumentation
      is requested by the kernel and bare-metal libcs (newlib-nano) do not
      provide the _chk variants by default. This is an un-enabled
      compiler/libc feature on a live attack surface, the same framing the
      in-file C1a.7 fork_notes establish and that tock/zephyr use for
      un-enabled toolchain hardening
      (zephyr scores P=1 via Picolibc FORTIFY wrappers, proving the mechanism
      is applicable on Cortex-M). D=S=A=T=0 follow from P=0.
  C1a.5:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel has no in-tree sanitizer plumbing: there is no
        shadow-memory backing, no redzone insertion in heap_*.c, and no
        -fsanitize=* flag in the (out-of-tree) build templates.
        AddressSanitizer's runtime assumes a host operating system with
        mmap/dlsym, which is unavailable on bare-metal Cortex-M targets.
    commits: []
    discussions: []
    rationale: |
      P=0: the out-of-bounds surface exists (unchecked C array/pointer access
      throughout tasks.c/queue.c/heap_*.c) and no sanitizer instrumentation is
      wired into the kernel. Zephyr scores P=1 for the same mechanism via
      CONFIG_ASAN/CONFIG_UBSAN on native_sim/QEMU targets, and FreeRTOS has an
      equivalent substrate (the POSIX/Linux simulator port) where ASan is
      usable — so the mechanism is applicable to the ecosystem and merely
      absent in-tree, not structurally impossible. D=S=A=T=0 follow from P=0.
  C1a.6:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        ARM MTE is part of ARMv8.5-A / ARMv9-A and ships only on Cortex-A class
        application cores (e.g. Cortex-A715). The FreeRTOS evaluation target is
        Cortex-M33 (ARMv8-M), which has no memory-tagging ISA extension.
    commits: []
    discussions: []
    rationale: |
      N/A on the Cortex-M33 default configuration — the underlying ISA does not
      expose the feature.
  C1a.7:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age: 0
    T_maintained: 0
    implementation:
      config_options: []
      source_files:
      - "sources/freertos/tasks.c (e.g. the pxReadyTasksLists[ uxPriority ] indexing and the notification-array writes are plain C subscripts with no compiler-inserted bound check)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (IS_EXTERNAL_INDEX_VALID / CONVERT_TO_INTERNAL_INDEX validate the opaque handle index before indexing the kernel-object pool — a hand-written range check on one specific table, not a general UBSAN_BOUNDS instrumentation pass)"
      default_state: >-
        A whole-tree grep for -fsanitize / UBSAN / __ubsan returns nothing:
        FreeRTOS-Kernel ships portable C with no build system, and neither the
        kernel nor the (out-of-tree) build templates request the compiler's
        array-bounds instrumentation. The only bounds-style checks present are
        the manual heap-block bounds test (heap_5.c) and the manual
        opaque-handle index validation in mpu_wrappers_v2.c — narrow,
        hand-written guards on individual tables, not a systematic CWE-129
        instrumentation. The integrator's toolchain decides whether
        -fsanitize=bounds is on, and arm-none-eabi-gcc/Clang would need a trap
        handler the kernel does not provide.
    commits: []
    discussions: []
    rationale: |
      P=0: the kernel build ships no array-bounds instrumentation — no
      -fsanitize=bounds, no UBSAN_BOUNDS, no __counted_by, and no trap path
      for an out-of-bounds subscript. The surface exists (the kernel indexes
      arrays such as pxReadyTasksLists[uxPriority] with plain C subscripts),
      so this is a real absent-mechanism, scored P=0 rather than na (see
      fork_notes for why this diverges from the C1a.5 na precedent).
      D=S=A=T=0 follow from P=0 per the rubric. The only bounds-style logic in
      the tree (manual heap-block range test, manual opaque-handle index
      validation in mpu_wrappers_v2.c) is narrow hand-written checking on
      individual tables, not the systematic compiler instrumentation C1a.7
      measures, and whether the integrator enables -fsanitize=bounds is outside
      the kernel's control (the same framing C2a.1 / C1a.4 / C1c.1 use for
      compiler features the kernel cannot enforce on the integrator's behalf,
      but recorded as P=0 because the array-index surface is present rather
      than structurally absent).
  C1b.1:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        All five FreeRTOS heap implementations (heap_1..heap_5) return freed
        memory to the allocator immediately. heap_4 and heap_5 coalesce adjacent
        free blocks in-place inside vPortFree → prvInsertBlockIntoFreeList,
        which is the opposite of a quarantine. There is no kref/RCU subsystem
        and no type-stable slab cache that could defer reuse across a grace
        period.
    commits: []
    discussions: []
    rationale: |
      P=0: the use-after-free surface plainly exists — FreeRTOS has a kernel
      heap (heap_1..heap_5) and a UAF there hits a newly recycled allocation
      on the very next pvPortMalloc — and no allocator-level mitigation
      (quarantine, delayed reuse, type-stable caches) is present. An OS with
      a kernel heap cannot be N/A for UAF mitigation (hurd's zalloc heap is
      scored P=0 on the same grounds); na is reserved for kernels with no
      heap at all (tock).
      D=S=A=T=0 follow from P=0.
  C1b.2:
    P: 1
    D: 2
    S: 1
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_HEAP_PROTECTOR (default 0 — opt-in XOR-canary obfuscation of pxNextFreeBlock)"
      source_files:
      - "sources/freertos/portable/MemMang/heap_4.c:76-84 (heapBLOCK_ALLOCATED_BITMASK / heapBLOCK_IS_ALLOCATED / heapALLOCATE_BLOCK / heapFREE_BLOCK)"
      - "sources/freertos/portable/MemMang/heap_4.c:106-131 (heapPROTECT_BLOCK_POINTER XOR-canary wrapper, gated on configENABLE_HEAP_PROTECTOR)"
      - "sources/freertos/portable/MemMang/heap_4.c:368-372 (vPortFree asserts allocated bit set AND pxNextFreeBlock == NULL — catches double-free and freelist tampering)"
      - "sources/freertos/portable/MemMang/heap_5.c (heap_5 inherits the same checks; adds multi-region heap support)"
      - "sources/freertos/include/FreeRTOS.h:2789-2790 (#ifndef configENABLE_HEAP_PROTECTOR → default 0)"
      default_state: >-
        In the kernel's default heap_4/heap_5 build, every vPortFree validates
        that the block currently has the allocation bit set and that its forward
        pointer is NULL — catching the classic double-free and a class of
        header-tampering bugs. configENABLE_HEAP_PROTECTOR is off by default;
        when enabled, it XOR-masks all pxNextFreeBlock writes with a build-time
        canary (xHeapCanary) and calls heapVALIDATE_BLOCK_POINTER on every
        traversal. heap_1/heap_2/heap_3 have no equivalent integrity checks;
        heap_1 cannot even free.
    commits:
    - hash: "0d9649ca4"
      date: "2023"
      description: "Heap protect (#747)"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/747"
    rationale: |
      P=1: heap-metadata integrity exists in the form of the allocation-bit
      tagging, the double-free assert, and the opt-in XOR freelist canary.
      D=2: heap_4 / heap_5 are the de-facto defaults for any non-trivial
      FreeRTOS integration, and the double-free assert and allocation-bit
      check ship enabled in those allocators — but configENABLE_HEAP_PROTECTOR
      is off, so the freelist XOR canary is not on by default. S=1: the checks
      are limited (single MSB bit, single forward-pointer NULL test); there is
      no per-cache type separation, no inline canary on the user data area,
      and no freelist randomization. A=2: in-tree allocator design choice. T=3:
      the heap_4 layout and the double-free assert are years old (T_age=3) and
      the recent heapPROTECT_BLOCK_POINTER addition shows continued maintenance
      (T_maintained=3).
  C1b.3:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS objects (tasks, queues, semaphores, timers) are not
        reference-counted in the Linux kref sense — ownership is single, set at
        xTaskCreate/xQueueCreate time and released at the corresponding delete.
        The few internal counters (uxNumberOfTasks, semaphore use count) are
        plain UBaseType_t and have no overflow-checked wrapper.
    commits: []
    discussions: []
    rationale: |
      N/A — there is no kernel-internal refcount surface that the
      refcount_t/RefPtr-with-saturation pattern would protect. The taxonomy
      already records "no equivalent" for the BSDs on the same grounds.
  C1b.4:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS's ready/blocked/suspended task lists, timer list, and queue
        waiter lists are all intrusive doubly-linked lists managed by list.c
        (vListInsert / vListInsertEnd / uxListRemove). The implementation writes
        raw pxNext/pxPrevious pointers and does not poison removed nodes or
        cross-check next->prev == self on traversal. Use of these lists is
        confined to kernel-internal calls; there is no API that lets a task hand
        a list-node pointer to the kernel.
    commits: []
    discussions: []
    rationale: |
      P=0: the linked-list corruption surface plainly exists — the ready/
      blocked/suspended task lists, timer list, and queue waiter lists are
      all intrusive doubly-linked lists with raw pxNext/pxPrevious pointers
      and no poisoning or next->prev==self consistency checks — and no
      hardening mechanism is shipped. Zephyr scores the identical situation
      P=0 (sys_dlist/sys_slist without poisoning), and the BSDs/hurd are P=0
      on the same grounds; na would wrongly claim the surface is absent for
      a C kernel whose scheduler is built on intrusive lists. D=S=A=T=0
      follow from P=0.
  C1b.5:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Same rationale as C1a.6 — the ISA extension does not exist on
        Cortex-M33.
    commits: []
    discussions: []
    rationale: |
      N/A on the Cortex-M33 default configuration.
  C1c.1:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel ships portable C sources without a build system, so
        whether GCC/Clang's -ftrivial-auto-var-init=zero is enabled is entirely
        an integrator decision. The kernel itself has no Kconfig switch that
        toggles auto-init and no #pragma block that forces it. Task TCBs are
        explicitly memset to zero in prvInitialiseNewTask (tasks.c), and the
        stack body is memset to 0xA5 when configCHECK_FOR_STACK_OVERFLOW=2 — but
        this is initialisation of task-managed memory, not the compiler-level
        local-variable init the taxonomy is asking about.
    commits: []
    discussions: []
    rationale: |
      P=0: the uninitialised-local surface exists (plain C stack locals
      throughout the kernel) and the kernel does not enable
      -ftrivial-auto-var-init=zero. An un-enabled compiler feature on a live
      surface is an absence, not inapplicability — the same framing as the
      in-file C1a.7/C1c.2 fork_notes and zephyr's C1c.1 P=0. D=S=A=T=0 follow
      from P=0.
  C1c.2:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age: 0
    T_maintained: 0
    implementation:
      config_options: []
      source_files:
      - "sources/freertos/portable/MemMang/heap_4.c (pvPortMalloc returns the block pointer with no memset; the only zeroing path is vPortFree under configHEAP_CLEAR_MEMORY_ON_FREE)"
      - "sources/freertos/include/portable.h (pvPortCalloc declaration — implemented as a caller-side malloc+memset; not a heap policy)"
      default_state: >-
        There is no zero-on-allocation heap policy: every pvPortMalloc returns
        whatever bytes were in the freed slab. The closest substitute is the
        C3c.1 mechanism (configHEAP_CLEAR_MEMORY_ON_FREE), which when enabled
        zeros each block on free and *as a side-effect* causes the next
        allocation to come back zero; that is the canonical mechanism for that
        knob and is scored at C3c.1, not here.
    commits: []
    discussions: []
    rationale: |
      P=0: no heap-allocator zero-on-alloc primitive. D/S/A/T=0 follow. The
      configHEAP_CLEAR_MEMORY_ON_FREE flag and pvPortCalloc both produce a
      zeroed-buffer effect for some calling patterns, but neither is a heap
      allocation-time initialisation policy: the former is a free-time
      sanitisation (scored at C3c.1) whose alloc-time effect is contingent on
      the block being freed-then-reallocated, and the latter is a caller-side
      memset wrapper that only fires when the application chooses pvPortCalloc.
      The framework's Linux precedent separates CONFIG_INIT_ON_ALLOC from
      CONFIG_INIT_ON_FREE for exactly this reason; this entry records the
      alloc-side gap honestly while keeping the kernel-shipped free-side
      mechanism at its canonical C3c.1 home.
  C1d.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Each FreeRTOS task has a single stack allocated at task-create time and
        used unmodified for the lifetime of the task. The Cortex-M exception
        entry path writes the hardware exception frame at the current PSP
        without any randomised offset adjustment. No
        CONFIG_RANDOMIZE_KSTACK_OFFSET equivalent exists.
    commits: []
    discussions: []
    rationale: |
      N/A — there is no entropy source wired into the scheduler/IRQ path that
      could be repurposed for stack-offset randomisation, and the deterministic
      fixed-address model is intentional for real-time predictability.
  C1d.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
