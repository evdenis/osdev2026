      source_files:
      - "sources/freertos/include/FreeRTOS.h:3043-3051 (#ifndef configENABLE_PAC / configENABLE_BTI → default 0)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:384-393 (portCONTROL_UBTI_EN / portCONTROL_BTI_EN bit definitions; ID_ISAR5 read to verify FEAT_PACBTI implementation)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:2249-2281 (prvConfigurePACBTI: configASSERT on portID_ISAR5_REG, sets BTI_EN | UBTI_EN in CONTROL, executes `msr control, %0` when xWriteControlRegister==pdTRUE)"
