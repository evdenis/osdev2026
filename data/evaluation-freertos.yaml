        FreeRTOS has no filesystem-level integrity layer analogous to
        IMA/EVM, IPE, fs-verity or Fuchsia's blobfs Merkle tree: tasks
        execute from the same statically-linked image as the kernel, with
        no load-time hash check. Signing/encryption of the final firmware
        binary (when required) is a downstream step performed by the
        integrator's vendor toolchain — MCUboot's imgtool, STMicro
        STM32CubeProgrammer, NXP elftosb/SPSDK, Microchip MPLAB Code
        Configurator — and is verified by the bootloader, not by the
        kernel.
    commits: []
    discussions: []
    rationale: >-
      N/A: no kernel-side executable/object integrity verification exists,
      and the kernel build itself does not sign or encrypt its output.
      Image signing and on-flash encryption are bootloader/vendor-toolchain
      concerns.
  C7a.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        The Cortex-M33 pipeline is a 3-stage in-order scalar design with no
        speculative execution past unresolved bounds checks. The kernel
        therefore ships no array_index_nospec-style macros, no CSDB/SSBB
        barriers at bounds-check sites, and no -mspeculative-load-hardening flag
        in the portable/GCC/ARM_CM33* tree.
    commits: []
    discussions: []
    rationale: |
      N/A — Spectre v1 (CVE-2017-5753) presupposes an out-of-order, speculative
      pipeline that transiently issues bounded loads past a not-yet-resolved
      compare. Armv8-M Mainline / Cortex-M33 has none of that microarchitectural
      substrate, so the mechanism has no target to defend.
  C7a.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        The Cortex-M33 branch predictor is structural (small BTAC) and does not
        drive speculative execution of indirect-branch targets in the way x86
        OoO cores do. There are no IA32_SPEC_CTRL-equivalent MSRs, no retpoline
        thunk emission in the portable/GCC/ARM_CM33* ports, and no BHB-clearing
        sequences.
    commits: []
    discussions: []
    rationale: |
      N/A — Spectre v2 / BTI / Retbleed / BHI all depend on a misprediction
      window driving an out-of-order pipeline. The retpoline and IBRS/IBPB
      mitigations are x86-64-specific microcode/codegen contracts. Cortex-M33
      offers neither the substrate nor the mitigation surface.
  C7a.3:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Cortex-M33 retires stores in program order from an in-order pipeline and
        does not speculatively forward older stores past unresolved address
        calculations. The kernel ships no SSBD-equivalent toggle and no per-task
        prctl interface.
    commits: []
    discussions: []
    rationale: |
      N/A — Spectre v4 (CVE-2018-3639) requires speculative store-bypass in an
      out-of-order memory pipeline. The Armv8-M Mainline profile defines no
      such speculation, so the IA32_SPEC_CTRL.SSBD-style mitigations have
      nothing to gate.
  C7a.4:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Straight-line speculation is an Arm Cortex-A / x86-OoO phenomenon in
        which the front end fetches and speculatively executes instructions
        sequentially past an unconditional RET/BR. The Cortex-M33 in-order front
        end does not exhibit this behaviour, and the kernel build emits no
        -mharden-sls equivalent or speculation-barrier padding.
    commits: []
    discussions: []
    rationale: |
      N/A — SLS (CVE-2021-26341) targets cores with deep speculative fetch
      beyond unconditional branches. Armv8-M Mainline / Cortex-M33 has neither
      the fetch depth nor the speculative-execution machinery, so the
      mitigation has no analogue here.
  C7b.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Meltdown (CVE-2017-5754) relies on an OoO core dereferencing a
        privileged address speculatively before the page-fault check retires.
        Cortex-M33 retires faults in-order on the offending instruction, so
        transient kernel reads from unprivileged tasks are not possible. The
        kernel correspondingly ships no KPTI-equivalent (see also C3b.1).
    commits: []
    discussions: []
    rationale: |
      N/A — the Meltdown attack model is constructively impossible on an
      in-order pipeline that resolves the permission check before any
      dependent micro-op can populate the cache. FreeRTOS on Cortex-M33
      therefore has no need for the PTI-class isolation that this mechanism
      cross-references.
  C7b.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        L1TF / Foreshadow (CVE-2018-3615) exploits an Intel-specific bug where a
        not-present PTE's physical-frame bits are still used to speculatively
        fetch data from the L1D. Cortex-M33 has no such speculative TLB/L1
        interaction, typically no L1 D-cache at all on the common SKUs, and the
        kernel ships neither PTE-inversion code nor any L1D-flush primitive
        (there is also no KVM-like guest-entry path).
    commits: []
    discussions: []
    rationale: |
      N/A — L1TF is an Intel x86 microarchitectural defect with no analogue in
      the Armv8-M Mainline profile. FreeRTOS additionally does not run nested
      guests, so the conditional L1D-flush half of the Linux mitigation has no
      callers either.
  C7c.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        MDS / TAA / MMIO-stale-data are Intel-specific leaks of fill-buffer,
        store-buffer, and load-port contents through transient execution.
        Cortex-M33 has none of those buffers exposed via speculative paths, and
        the instruction-set has no VERW-equivalent buffer-clearing operation.
        The kernel issues no buffer-clearing on context-switch or exception
        return.
    commits: []
    discussions: []
    rationale: |
      N/A — the MDS family of attacks targets Intel-specific internal buffers
      that Cortex-M33 simply does not have, and the VERW-with-segment-operand
      microcode contract is x86-only. There is nothing for FreeRTOS to clear.
  C7c.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Armv8-M Mainline cores execute one hardware thread per core; there is no
        simultaneous-multi-threading and therefore no cross-thread sharing of
        branch-predictor or speculation state to isolate. The kernel exposes no
        STIBP-equivalent MSR and no SMT-disable toggle.
    commits: []
    discussions: []
    rationale: |
      N/A — STIBP and the SMT-disable mitigation exist specifically to keep
      sibling hardware threads from poisoning each other's indirect-branch
      predictors. Cortex-M33 has no sibling threads, so the attack model and
      its mitigations are both inapplicable.
  C5e.1:
    P: 1
    D: 1
    S: 1
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configCHECK_FOR_STACK_OVERFLOW (default 0 — opt-in stack-overflow detection; cross-ref C1a.1)"
      - "configUSE_MALLOC_FAILED_HOOK (default 0 — opt-in callback when pvPortMalloc returns NULL; include/FreeRTOS.h:93-94)"
      - "INCLUDE_vTaskDelete (gates the vTaskDelete teardown primitive)"
      source_files:
      - "sources/freertos/tasks.c:5153,5254 (taskCHECK_FOR_STACK_OVERFLOW() invoked on every context switch when the check is enabled — the detection trigger)"
      - "sources/freertos/include/stack_macros.h:77,94,116,141 (the check calls vApplicationStackOverflowHook(), which the application must supply and which decides what to do)"
      - "sources/freertos/portable/MemMang/heap_4.c:336-347 (allocation failure returns NULL and, only if configUSE_MALLOC_FAILED_HOOK==1, calls the app-provided vApplicationMallocFailedHook — graceful failure, app-chosen response)"
      - "sources/freertos/tasks.c:2213 (vTaskDelete — the kernel-provided teardown primitive an application's fault handler can call to remove a faulting task)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c (no MemManage_Handler / HardFault_Handler is defined here — a whole-port grep finds none; on an MPU access violation the application's fault vector runs, and containment/restart is entirely the integrator's code)"
      default_state: >-
        On the evaluated MPU baseline the kernel offers fault *detection* hooks
        but no fault *recovery*: configCHECK_FOR_STACK_OVERFLOW defaults to 0
        (and on the MPU port the software check is itself superseded by the
        Armv8-M PSPLIM register — see C1a.1), configUSE_MALLOC_FAILED_HOOK
        defaults to 0 so the default behaviour on heap exhaustion is a silent
        NULL return that the caller must check, and the MemManage fault on an
        unprivileged task's access violation is delivered to an
        application-supplied handler because the kernel ships none. vTaskDelete
        exists so an application fault handler *can* contain a faulting task,
        but the kernel never invokes it automatically. There is no
        soft/hard-lockup detector, no hung-task detector, and no kernel
        self-watchdog; the only liveness backstop — a hardware watchdog — is
        board/application code outside the FreeRTOS-Kernel tree.
    commits:
    - hash: "39f6b0b5d"
      date: "2008-03-03"
      description: "Add stack check macros."
    - hash: "4640196be"
      date: "2009-09-28"
      description: "Add CM3 MPU port."
    discussions: []
    rationale: |
      P=1: the kernel does ship fault-handling primitives — overflow-detection
      hooks, a graceful NULL-return allocation-failure path, the MPU MemManage
      trap that catches an unprivileged task's access violation, and vTaskDelete
      to tear a faulting task down. D=1: every one of these is opt-in or
      app-defined — configCHECK_FOR_STACK_OVERFLOW and configUSE_MALLOC_FAILED_HOOK
      both default to 0, the stack/malloc hooks must be provided by the
      integrator, and the MemManage handler that would turn a fault into a
      restart is application code (the kernel defines none). S=1: there is no
      kernel self-monitoring at all — no lockup/hung-task detector, no kernel
      watchdog — so a hang or livelock inside privileged code is undetected, and
      even the detection that exists hands off to application code that decides
      (and may do nothing); the containment unit is the unprivileged task, and a
      privileged-side fault is uncontained. A=2: the detection hooks, the
      MemManage trap, and vTaskDelete are genuine in-tree features layered on the
      scheduler and the MPU port, but fault containment is not a core design
      property of the kernel the way it is in a microkernel with a per-component
      fault-handler endpoint. T_age=3 (the stack-check macros date to 2008 and
      vTaskDelete/the MPU trap are similarly long-standing) and T_maintained=3
      (tasks.c, the heap allocators, and the CM33 port are actively maintained);
      T = min(3,3) = 3. This sits at/just below openbsd C5e.1 (P=1 D=1 S=1 A=2 T=3,
      panic-reboot default-on, no detectors): FreeRTOS matches openbsd's "detection
      present, recovery weak, no detectors" shape but its default-posture recovery
      is even more app-dependent (no kernel-default reboot-on-fault), so the D=1/S=1
      pairing is the consistent placement; both sit well below linux (P=1 D=2 S=2 T=3,
      which ships always-on lockup/hung-task detectors and a watchdog framework).
  C5e.2:
    P: 1
    D: 2
    S: 1
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configUSE_PREEMPTION (no default — mandatory #error if undefined; include/FreeRTOS.h:180-181. The evaluated baseline is a preemptive config)"
      - "configUSE_TIME_SLICING (default 1 — round-robins equal-priority ready tasks on each tick; include/FreeRTOS.h:2749-2750)"
      - "INCLUDE_vTaskPrioritySet (gates the priority-set API; the wrapper is privileged-only regardless)"
      source_files:
      - "sources/freertos/include/FreeRTOS.h:2749-2750 (#ifndef configUSE_TIME_SLICING → default 1)"
      - "sources/freertos/tasks.c (fixed-priority preemptive scheduler: highest-priority ready task always runs; equal-priority tasks round-robin under configUSE_TIME_SLICING)"
      - "sources/freertos/include/mpu_syscall_numbers.h (the complete 70-entry SVC syscall table: uxTaskPriorityGet is number 7, but there is NO SYSTEM_CALL_vTaskPrioritySet — priority *elevation* is not reachable from an unprivileged task; only the read-only getter is)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c:1679 (MPU_vTaskPrioritySet is annotated PRIVILEGED_FUNCTION and has no ...Impl SVC-dispatch variant, so it can only be invoked from already-privileged code — an unprivileged task that calls it traps rather than elevating)"
      default_state: >-
        The scheduler is fixed-priority preemptive: the highest-priority ready
        task always runs, and equal-priority ready tasks share the CPU
        round-robin via time-slicing (configUSE_TIME_SLICING=1 by default). This
        bounds starvation *among peers of equal priority* and lets a
        higher-priority watchdog/supervisor task always preempt a runaway
        lower-priority task. On the MPU baseline the fairness is enforceable
        against a hostile task: vTaskPrioritySet, vTaskSuspendAll, and
        vTaskDelete are all privileged-only (absent from the SVC syscall table
        in mpu_syscall_numbers.h and lacking an ...Impl dispatch stub), so a
        compromised unprivileged task cannot promote itself to the top priority
        to monopolise the core. What is missing is any *budget* enforcement:
        there is no per-task CPU-time quota, no bandwidth cap (cf. Linux cgroup
        cpu.max), and no admission control — a malicious or buggy task running
        at or above its peers' priority can still consume 100% of its
        time-slices indefinitely, and a high-priority task can starve everything
        below it by design.
    commits:
    - hash: "4e9374ad9"
      date: "2013-06-06"
      description: "Add default value for configUSE_TIME_SLICING"
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: the kernel provides a temporal-isolation primitive — a fixed-priority
      preemptive scheduler with default-on time-slicing — and, on the evaluated
      MPU baseline, the primitive is actually *enforceable* against a compromised
      task because priority elevation (vTaskPrioritySet) is privileged-only and
      unreachable from the unprivileged-task SVC surface (verified: no
      SYSTEM_CALL_vTaskPrioritySet in mpu_syscall_numbers.h, no ...Impl dispatch
      stub in mpu_wrappers_v2.c). D=2: time-slicing is default-on
      (configUSE_TIME_SLICING=1) and the baseline is a preemptive configuration,
      so the fairness behaviour is the default in the evaluated config (not merely
      an opt-in knob). S=1: this is priority-based fairness, not a CPU-budget/
      bandwidth cap — there is no per-task time quota, no admission control, and
      no equivalent of Linux's hierarchical cpu.max or RT-throttling; a task that
      is at or above its peers' priority can still consume the CPU indefinitely
      and a high-priority task starves lower ones by design, so the protection
      against CWE-400 CPU-starvation is weak. A=2: the preemptive scheduler and
      the privileged-only priority API are in-tree design properties (the MPU
      syscall split that makes elevation privileged-only is the same primitive
      C4.3 scores), but there is no dedicated CPU-budget-enforcement architecture.
      T_age=3 (the time-slicing default dates to 2013 and the preemptive scheduler
      is far older) and T_maintained=3; T = min(3,3) = 3. This sits below both
      openbsd C5e.2 (P=1 D=2 S=1 A=1 T=3 — RLIMIT_CPU actually *kills* a runaway
      process, a real if coarse budget) and well below linux C5e.2 (P=1 D=2 S=2
      A=2 T=3 — hierarchical bandwidth + admission control): FreeRTOS shares the
      D=2 default-on placement but its S=1 reflects that it offers fairness only,
      with no budget that bounds a single task's total CPU consumption. A=2 (vs
      openbsd's A=1) credits that the enforceability rests on the architectural
      MPU privilege split, not merely on scheduler priorities.
  C5e.3:
    P: 1
    D: 1
    S: 1
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configSUPPORT_STATIC_ALLOCATION (default 0 — when 1, *Static object-creation APIs let the application pre-allocate all kernel objects, with no runtime heap use; include/FreeRTOS.h:2819-2821)"
      - "configSUPPORT_DYNAMIC_ALLOCATION (default 1 — the evaluated default; pvPortMalloc from the shared heap; include/FreeRTOS.h:2828-2830)"
      - "configTOTAL_HEAP_SIZE (fixed compile-time size of the heap_4/heap_5 arena — the only bound on total dynamic memory; image-wide, not per-task)"
      source_files:
      - "sources/freertos/portable/MemMang/heap_4.c (single shared first-fit arena of configTOTAL_HEAP_SIZE bytes; every task draws from the same pool with no per-task accounting or limit)"
      - "sources/freertos/portable/MemMang/heap_4.c:336-350 (exhaustion is graceful: pvPortMalloc returns NULL — no kill, no quota charge, no attribution of which task consumed the heap)"
      - "sources/freertos/include/FreeRTOS.h:2819-2830 (configSUPPORT_STATIC_ALLOCATION default 0, configSUPPORT_DYNAMIC_ALLOCATION default 1)"
      - "sources/freertos/tasks.c (xTaskCreateStatic and the other *Static creators consume caller-provided StaticTask_t + stack buffers, using no heap when the application provisions statically)"
      default_state: >-
        There is no runtime per-task resource quota of any kind: no equivalent
        of Linux's memory.max/pids.max or RLIMIT_AS, no per-task heap
        accounting, and no OOM-style attribution. In the default dynamic
        configuration (configSUPPORT_DYNAMIC_ALLOCATION=1, heap_4) every task
        allocates from one shared arena, so any single task can exhaust the heap
        and deny allocations to all others; the only thing that happens is
        pvPortMalloc returns NULL and well-written callers degrade gracefully.
        The kernel's actual defence against resource exhaustion is structural
        and opt-in: (a) configTOTAL_HEAP_SIZE caps total dynamic memory at a
        fixed compile-time bound, and (b) configSUPPORT_STATIC_ALLOCATION
        (default off) lets the integrator allocate every task, queue, semaphore
        and timer from caller-supplied static buffers at build time, so a
        fully-static image has no runtime heap to exhaust at all. Both are
        image-wide design decisions, not per-principal quotas.
    commits:
    - hash: "210b1ffcc"
      date: "2020-02-10"
      description: "Re-sync with upstream and stripping away none kernel related. (static-allocation support predates this squashed history baseline)"
    discussions: []
    rationale: |
      P=1: a resource-exhaustion defence exists in some form — configTOTAL_HEAP_SIZE
      caps total dynamic memory at a fixed compile-time bound, and
      configSUPPORT_STATIC_ALLOCATION lets the application eliminate the runtime
      heap entirely by provisioning every kernel object statically. The exhaustion
      surface is present in the default dynamic config, so this is P=1 rather than
      na (see fork_notes). D=1: the strong form (fully-static provisioning) is
      opt-in and off by default (configSUPPORT_STATIC_ALLOCATION=0); the evaluated
      default uses dynamic heap_4, whose only bound is the image-wide
      configTOTAL_HEAP_SIZE. S=1: the protection is weak as a *quota* mechanism —
      there is no per-task limit, no accounting, and no attribution, so in the
      default config any task can exhaust the shared heap and starve every other
      task; the bound is on the whole image, not on the offending principal, and
      graceful NULL-return is mitigation-by-caller-discipline, not enforcement.
      A=2: the fixed-arena allocator and the static-allocation creators are in-tree
      design choices (the same allocator family scored at C1b.2), but a per-task
      resource-quota framework is simply not part of the architecture. T_age=3
      (static allocation and the bounded heap are long-standing — see fork_notes on
      the squashed history) and T_maintained=3 (the heap allocators are actively
      maintained); T = min(3,3) = 3. This sits below both openbsd and linux C5e.3
      (each P=1 D=2 S=2 A=2 T=3, which provide real per-principal limits —
      setrlimit RLIMIT_AS / login.conf classes and cgroup memory.max+pids.max
      respectively): FreeRTOS has only an image-wide bound and an opt-in static
      mode, with no per-task quota, hence D=1/S=1. Cross-RTOS, this is the same
      P=1 band as zephyr (fixed-size resource pools) and tock (MPU-bounded grant
      region per process); FreeRTOS is weaker than tock here because tock's grant
      is a genuine per-process bound whereas FreeRTOS's heap is shared with no
      per-task cap.
  C7d.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        The evaluated target is a single-core Cortex-M33. There is no shared
        multi-level cache contended between concurrently-live security domains
        (no SMT sibling, no second core sharing an LLC), so the cross-domain
        cache-timing channel that C7d.1 partitions does not arise. Cortex-M
        parts commonly have only small, optionally-present caches and no
        architectural cache-allocation/way-partitioning facility (no resctrl/CAT
        analogue), and the FreeRTOS Cortex-M ports contain no cache-colouring,
        no flush-on-context-switch for side-channel reasons, and no
        page-colouring (there is no MMU). The framework's applicability rules
        list FreeRTOS as N/A for C7d.1 on exactly these grounds.
    commits: []
    discussions: []
    rationale: |
      N/A — the time-protection / cache-partitioning attack surface requires a
      shared multi-level cache contended across isolation domains, which the
      single-core Cortex-M33 target does not have, and the M-profile ISA exposes
      no cache-allocation primitive to partition with. This mirrors the
      framework's N/A treatment of the other cacheless/single-core MCU targets
      for this row (zephyr, contiki-ng, nuttx, tock all N/A) and matches the
      taxonomy hint ("N/A — single-level cache / no shared LLC across domains").
      Note this contrasts with openbsd's P=0 for C7d.1: on a server CPU the
      shared-LLC surface exists (so absence of partitioning is P=0), whereas on
      Cortex-M33 the surface itself is absent (N/A) — the same distinction the
      framework draws between "surface exists → P=0" and "no shared multi-level cache
      → N/A".
