        complementary MPU rules: (a) the privileged-RAM region is XN, so kernel
        data is never executable, and (b) per-task RAM regions are XN even from
        privileged mode, so a task can never execute code it has placed in its
        own RAM. The only executable text is privileged-flash and
        unprivileged-flash, both RO. The mpu_wrappers_v2 SVC trampolines are the
        only gateway from unprivileged to privileged execution.
