    commits:
    - hash: "7081e76f5"
      date: "2024"
      description: "Armv8.1-m: Add pacbti support (#1147)"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/1147"
    rationale: |
      P=1: the kernel ships an opt-in ARM PAC port for ARM_CM33 with per-task
      key isolation across context switches — substantially more than just a
      compile-time toggle. D=1: configENABLE_PAC defaults to 0, the integrator
      must also implement an RNG hook and build with -mbranch-protection=pac-ret.
      S=2: on FEAT_PACBTI silicon return-address forgery requires guessing a
      task-private 128-bit key, and the key is rotated across tasks so a leak
      in one task does not compromise another — but a kernel-mode compromise
      can read the keys out of any TCB and the protection is only as wide as
      the compiler's pac-ret instrumentation. A=2: in-tree port option, not a
      core architectural property. T=2: PAC support landed in the V11.x kernel
      line in 2023–2024 (T_age=2) and continues to be maintained
      (T_maintained=2).
  C2b.4:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FEAT_GCS is defined for the Armv9.4-A application-profile architecture
        and ships only on recent Cortex-A class cores; it has no encoding in
        Armv8-M / Cortex-M33. The FreeRTOS evaluation target is Cortex-M33,
        which has no GCS register set and no GCS-aware exception flow. The
        kernel's backward-edge story on Cortex-M is instead the (opt-in,
        silicon-gated) ARM PAC scaffolding scored at C2b.3 plus the software
        stack-overflow check at C1a.1; there is no GCS equivalent to score here.
    commits: []
    discussions: []
    rationale: |
      N/A on the Cortex-M33 default configuration — the underlying ISA does
      not expose FEAT_GCS. Mirrors the framework's N/A treatment of the other
      A-profile/x86-only ISA features on this target (C2b.2 Intel CET shadow
      stack, C1a.6 / C1b.5 ARM MTE), and matches the taxonomy hint
      ("N/A on Cortex-M (FEAT_GCS is ARMv9.4-A only)"). Note that linux scores
      C2b.4 na on its x86-64 primary as well (GCS is EL0-only even on ARMv9.4
      silicon), so na here keeps cross-OS ordering consistent.
  C2c.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        The kernel is a pure scheduler / IPC / timer / heap core. There is no
        in-tree eBPF analogue, no Lua/JS engine, and no dynamic-code path that
        would emit instructions at runtime. The MPU-mode XN-on-RAM rule (scored
        under C1e.4) would in any case prevent execution of anything written to
        a task's data region.
    commits: []
    discussions: []
    rationale: |
      N/A — no in-kernel JIT to harden. Same posture as openbsd/netbsd/fuchsia.
  C3a.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel runs from a fixed flash region whose base is fixed by
        the integrator's linker script (e.g. 0x08000000 on STM32H5). The kernel
        performs no self-relocation at boot; there is no MMU, so 'virtual base'
        and 'physical base' are the same single address, and that address is
        constant across reboots. The taxonomy hint already records: 'N/A —
        kernel image at fixed link address; no base relocation'.
    commits: []
    discussions: []
    rationale: |
      N/A — the KASLR/KARL threat model presumes a relocatable kernel image
      mapped through MMU page tables that boot-time entropy can shuffle.
      FreeRTOS has neither: the image is linked once at a fixed flash address
      and runs in place. The 'kernel address disclosure' attack surface that
      this mechanism is meant to defend (an unprivileged user reading a leaked
      kernel pointer and deriving the rest of the layout from it) does not
      exist here — there is no MMU-mediated user mode that would benefit from
      not knowing the kernel layout, and integrator-built firmware images are
      single-image binaries with the layout known to anyone who has the .elf.
  C3a.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Function placement in the FreeRTOS image is determined entirely at link
        time by the integrator's linker script and the GCC/Clang section
        ordering. There is no boot-time pass that permutes function offsets and
        no compiler plugin equivalent to Linux's CONFIG_FG_KASLR. Without a base
        randomisation (C3a.1 N/A) there is also no granularity finer than that
        to randomise on top of.
    commits: []
    discussions: []
    rationale: |
      N/A — FG-KASLR is an enhancement to KASLR; both presuppose a relocatable
      kernel image and an attacker who only sees pointer leaks. FreeRTOS has
      neither prerequisite. The taxonomy hint already records: 'N/A — no KASLR'.
  C3b.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Cortex-M33 has an MPU, not an MMU; there are no page tables and no
        per-process address spaces to swap on syscall entry. The Meltdown family
        of attacks targets speculative dereferences across the kernel/user
        page-table boundary on Cortex-A class application cores; Cortex-M is an
        in-order microcontroller architecture without that boundary or that
        speculation surface. Privilege isolation on FreeRTOS-MPU is enforced by
        the MPU permission bits (PRIV-only vs all-access) rather than by
        separate address spaces.
    commits: []
    discussions: []
    rationale: |
      N/A — the KPTI mechanism is a defence against Meltdown-class transient
      reads across an MMU page-table boundary that does not exist on Cortex-M.
      The architectural substrate (MMU, page tables, out-of-order speculative
      load that survives a permission fault) is absent. The taxonomy hint
      already records: 'N/A — no MMU page tables; MPU regions enforce
      isolation'. The MPU isolation that takes its place is scored under
      C1e.4 and C1e.5.
  C3b.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        Armv8-M does not implement the PAN (Privileged Access Never) bit of
        Armv8-A or the SMAP CR4 bit of x86. The architectural substitute on
        Cortex-M33 is the MPU's per-region access-permission field: regions
        configured as PRIV_RW (privileged RAM, kernel control structures) are
        inaccessible to unprivileged tasks, and regions configured for the
        unprivileged task are normal accesses for both privileged and
        unprivileged code — there is no extra bit that makes the kernel
        temporarily blind to its own data while running privileged. The intent
        of SMAP/PAN (prevent unintended kernel dereferences of
        attacker-controlled user memory) is approximated by the MPU layout
        rather than by a CPL-orthogonal access-control bit.
    commits: []
    discussions: []
    rationale: |
      N/A — the ISA on the evaluation target does not expose a SMAP/PAN-style
      mode bit, and the FreeRTOS-MPU layout achieves the underlying privilege
      separation through MPU permission bits (scored under C1e.4 and C1e.5)
      rather than through a separate per-instruction access gate. The
      taxonomy hint already records: 'N/A on Cortex-M (no SMAP/PAN); MPU
      access bits give equivalent'.
  C3c.1:
    P: 1
    D: 1
    S: 1
    A: 2
    T_age: 2
    T_maintained: 3
    implementation:
      config_options:
      - "configHEAP_CLEAR_MEMORY_ON_FREE (default 0 — opt-in zeroing of freed blocks; supported by heap_2, heap_4, heap_5)"
      source_files:
      - "sources/freertos/portable/MemMang/heap_4.c:54-55 (#ifndef configHEAP_CLEAR_MEMORY_ON_FREE → default 0)"
      - "sources/freertos/portable/MemMang/heap_4.c:379-388 (memset(puc + xHeapStructSize, 0, ...) inside vPortFree, gated on configHEAP_CLEAR_MEMORY_ON_FREE)"
      - "sources/freertos/portable/MemMang/heap_5.c:88-89, 414 (same shape, multi-region heap)"
      - "sources/freertos/portable/MemMang/heap_2.c:55-56, 320 (heap_2 also supports the flag)"
      default_state: >-
        configHEAP_CLEAR_MEMORY_ON_FREE defaults to 0 in heap_2, heap_4 and
        heap_5. When the integrator sets it to 1, vPortFree memsets each
        released allocation's user payload to zero before returning the block to
        the freelist. heap_1 (no free) and heap_3 (wraps the toolchain's
        malloc/free) do not support the flag. As a side-effect, when the flag is
        enabled every subsequent pvPortMalloc returns zero-initialised memory,
        which substitutes for the absent zero-on-alloc heap policy (recorded at
        C1c.2).
    commits:
    - hash: "82be77995"
      date: "2022"
      description: "Heap improvements (#462)"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/462"
    rationale: |
      P=1: configHEAP_CLEAR_MEMORY_ON_FREE is the kernel-side zero-on-free
      mechanism — the canonical match for the C3c.1 "memory zeroing on free"
      taxonomy entry. D=1: defaults to 0 in every heap_*.c that supports it,
      so out-of-the-box vPortFree leaves the freed block contents intact.
      S=1: when enabled, closes the freed-memory-disclosure class for blocks
      that pass through vPortFree, but heap_1 / heap_3 cannot use the flag,
      and stack memory / TCB internals are not on the heap so they are
      unaffected. A=2: in-tree allocator option, not an architectural lift.
      T_age=2 / T_maintained=3 → T=2: configHEAP_CLEAR_MEMORY_ON_FREE was
      added relatively recently to the heap_4 family and continues to receive
      attention. The alloc-side gap is recorded separately at C1c.2 (P=0).
  C3c.2:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        On the MPU posture, SVC-mediated calls into the kernel use the calling
        task's own PSP stack to push the exception frame and run the wrapper;
        the SVC handler returns by popping that frame and resuming the task.
        There is no memset of the high-water portion of the stack before
        returning to unprivileged mode, and there is no separate kernel stack
        whose contents would be hidden from the unprivileged task even if
        scrubbed. In flat mode the question is moot — there is only one
        privilege level and one stack per task. The taxonomy hint already
        records: 'N/A — SVC syscall return path does not scrub stack'.
    commits: []
    discussions: []
    rationale: |
      P=0: the privileged-stack surface does exist on the MPU posture — the
      v2 MPU port gives each task a dedicated system-call stack
      (xSystemCallStackInfo, switched in vSystemCallEnter and restored in
      vSystemCallExit) and handler-mode code runs on the MSP — and neither is
      scrubbed on return to unprivileged mode. The stackleak-class infoleak
      channel (stale privileged-stack bytes copied
      out through partially-initialised structures) maps the same way it does
      on zephyr and tock, both of which score this absence P=0. MPU
      unreachability of the stacks (C1e.5) limits direct reads but not
      copy-out leaks. D=S=A=T=0 follow from P=0.
  C3c.3:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel ships portable C sources without a build system, and no
        port .mk fragment requests -fzero-call-used-regs. The Cortex-M
        context-switch path (PendSV_Handler in portasm.c) saves R4-R11 and the
        PSP of the outgoing task and restores those of the incoming task; it
        does not zero any registers as a leak-prevention measure.
        Caller-clobbered registers (R0-R3, R12) are not explicitly scrubbed
        either at function return or at PendSV exit — the task that gets
        dispatched simply overwrites them. The taxonomy hint already records:
        'N/A — no register scrubbing on context switch'.
    commits: []
    discussions: []
    rationale: |
      P=0: register-leak boundaries exist (function returns inside privileged
      code, SVC exit, the PendSV context switch) and no register scrubbing is
      applied at any of them — the kernel does not request
      -fzero-call-used-regs and the context-switch path restores the
      ABI-defined register sets without zeroing. Tock and zephyr score the
      identical absence P=0, and an un-enabled compiler feature on a live
      surface is an
      absence per the in-file C1a.7/C1c.2 fork_notes framing. D=S=A=T=0
      follow from P=0.
  C3d.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel has no printk / dmesg infrastructure: there is no kernel
        log ring buffer that a task could read. Diagnostic output, when
        integrators want it, goes through application-provided hooks (a
        serial-port putchar wrapper invoked by configPRINT_STRING or by
        Tracealyzer-style trace macros), and those hooks are part of the
        application, not a kernel-visible interface. There is no kallsyms table
        at runtime — symbol resolution happens at link time and is discarded;
        the .elf is held by the developer, not the device. The trace facility
        (traceTASK_SWITCHED_IN, etc., in include/FreeRTOS.h) is opt-in
        instrumentation that emits to an integrator-controlled sink, not a
        kernel-side log queryable by unprivileged tasks.
    commits: []
    discussions: []
    rationale: |
      N/A — the kptr_restrict / dmesg_restrict threat model presumes a
      kernel-maintained log and a kallsyms-style symbol map that
      unprivileged users can read by default. FreeRTOS has neither: there is
      no in-kernel log buffer, no /proc/kallsyms equivalent, and no
      filesystem through which such an interface could exist. The attack
      surface that the mechanism is meant to defend does not exist. This
      mirrors the framework's N/A treatment of Fuchsia for the same
      mechanism (Fuchsia is listed as N/A
      because "no dmesg, kallsyms; logs capability-gated by design"; the
      FreeRTOS situation is even simpler — there is no log at all).
  C3d.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS-Kernel ships no filesystem layer; integrators who want one bolt
        on FreeRTOS-Plus-FAT or LittleFS as application-level libraries.
        Crucially, there is no /proc, /sys, or /dev equivalent maintained by the
        kernel itself. The SVC dispatch table in mpu_wrappers_v2.c is the entire
        user-to-kernel interface; that interface surface is scored under C4
        (privilege boundary enforcement) rather than as an
        information-disclosure interface. The framework lists Fuchsia as N/A for
        this mechanism because 'no procfs/sysfs interfaces exist'; the same
        reasoning applies even more strongly to FreeRTOS, which additionally has
        no filesystem subsystem in the kernel.
    commits: []
    discussions: []
    rationale: |
      N/A — there is no kernel-side diagnostic filesystem (procfs, sysfs,
      debugfs) and no other generic introspection interface that would need
      a hidepid / protect_regular style restriction layered on. The attack
      surface the mechanism defends does not exist. This mirrors Fuchsia's
      explicit N/A and Fiasco's N/A on the same grounds. The closest functional analogue — the SVC syscall
      surface itself — is covered by C4.3 (syscall attack surface
      reduction), not by C3d.2.
  C4.2:
    P: 1
    D: 1
    S: 1
    A: 2
    T_age: 2
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition)"
      - "configUSE_MPU_WRAPPERS_V1=0 (use the opaque-handle v2 layer; default for new MPU configs)"
      - "configENABLE_ACCESS_CONTROL_LIST=1 (default 0 — gates the per-task ACL bitmap; without it xPortIsAuthorizedToAccessKernelObject returns pdTRUE unconditionally for all unprivileged tasks)"
      - "configPROTECTED_KERNEL_OBJECT_POOL_SIZE (sizes the global handle table)"
      source_files:
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (KernelObject_t pool, MPU_GetFreeIndexInKernelObjectPool / MPU_StoreHandleAndDataAtIndex / MPU_GetHandleAtIndex; CONVERT_TO_EXTERNAL_INDEX with INDEX_OFFSET=1 hands the unprivileged task an opaque integer rather than the real kernel pointer)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c:495 (xPortIsAuthorizedToAccessKernelObject called before MPU_xQueueGenericSendImpl dispatches into the real xQueueGenericSend; same pattern repeated for ~20 other queue/task/timer/event-group entry points)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:2156 (vPortGrantAccessToKernelObject / vPortRevokeAccessToKernelObject set/clear bits in xMPU_SETTINGS.ulAccessControlList)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:2196 (xPortIsAuthorizedToAccessKernelObject: tests the calling task's ACL bit for the kernel-object index; privileged tasks bypass; non-ACL build returns pdTRUE)"
      default_state: >-
        On the FreeRTOS-MPU posture with v2 wrappers, every kernel object an
        unprivileged task can reach is referenced by an opaque integer index
        (KernelObject_t pool); the kernel pointer never escapes the
        privileged-RAM region. When configENABLE_ACCESS_CONTROL_LIST is also
        set, each task additionally carries an ulAccessControlList[] bitmap and
        the SVC dispatcher rejects calls whose target index is not flagged for
        the calling task, which is the closest thing FreeRTOS has to per-task
        object capabilities. configENABLE_ACCESS_CONTROL_LIST defaults to 0, so
        on a default MPU build any unprivileged task can invoke any kernel
        object the v2 layer can resolve — the opaque-index indirection still
        blocks pointer forgery but not authority sharing.
    commits:
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    - hash: "170a291d4"
      date: "2023"
      description: "Add Access Control List to MPU ports (#765)"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/765"
    rationale: |
      P=1: there is per-task object-access enforcement, even if it is not a
      classical capability system. D=1: configENABLE_ACCESS_CONTROL_LIST
      defaults to 0; the opaque-handle indirection that ships with v2 wrappers
      is enabled by default on the MPU posture but it only prevents pointer
      forgery, not authority sharing. S=1: even with the ACL turned on, this
      is a coarse per-object permit/deny bitmap — there are no rights masks
      (no R vs RW distinction on a queue, no derive/delegate primitives, no
      revocation cascade); capabilities cannot be transferred between tasks
      except by privileged code editing the bitmap, and a single compromised
      privileged task or a kernel-mode write primitive trivially rewrites
      every bit. Compared with Fiasco's Obj_space or Fuchsia's zx_handle
      (S=3) the model is qualitatively weaker. A=2: in-tree opt-in feature of
      the MPU port rather than a foundational design property. T_age=2 (v2
      wrappers landed for V10.x, ~2-3 years stable as of V11.2.0),
      T_maintained=3 (mpu_wrappers_v2.c is actively touched in upstream); T =
      min(2,3) = 2.
  C4.3:
    P: 1
    D: 2
    S: 2
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition; without it tasks run privileged and the SVC layer is bypassed)"
      - "configUSE_MPU_WRAPPERS_V1=0 (selects the v2 layer with the SVC-number-bounded dispatch table; default for new MPU configs)"
      - "NUM_SYSTEM_CALLS (compile-time bound on the syscall number range checked by SVC_Handler)"
      source_files:
      - "sources/freertos/include/mpu_syscall_numbers.h (SYSTEM_CALL_* numeric assignments — the entire kernel surface reachable from unprivileged mode is enumerated here)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c:5030 (uxSystemCallImplementations[NUM_SYSTEM_CALLS] — flat array; disabled APIs are nulled to (UBaseType_t)0 at compile time, so configUSE_TASK_NOTIFICATIONS=0 etc. literally remove syscalls)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/portasm.c:537 (SVC_Handler: extracts SVC immediate, dispatches to vSystemCallEnter for numbers < NUM_SYSTEM_CALLS, vSystemCallExit for the exit number, vPortSVCHandler_C for the few privileged-only SVCs)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:1205 (vSystemCallEnter: checks (1) PC of the SVC instruction is inside __syscalls_flash_start__/__syscalls_flash_end__, (2) the per-task system-call stack is idle, (3) the chosen syscall is not nulled out by config; only then raises privilege and dispatches into the table)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (each MPU_xFoo wrapper additionally re-validates the opaque handle index before forwarding into the real kernel function)"
      default_state: >-
        On the FreeRTOS-MPU posture every unprivileged task hits the kernel only
        through the SVC instruction; the SVC handler is a single auditable entry
        point that bounds the syscall number, verifies the SVC instruction
        itself was issued from the linker-defined
        __syscalls_flash_start__..__syscalls_flash_end__ region (i.e. from the
        MPU_xFoo trampoline, not from an arbitrary task gadget), and only then
        raises privilege and indexes into uxSystemCallImplementations. Disabling
        a kernel facility in FreeRTOSConfig.h (configUSE_TIMERS=0,
        configUSE_TASK_NOTIFICATIONS=0, configUSE_EVENT_GROUPS=0, …) nulls the
        corresponding slots at compile time, deleting them from the attack
        surface entirely. There is no equivalent of seccomp's per-task BPF
        filter — the surface is shaped at build time, identically for every
        unprivileged task in the image.
    commits:
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: FreeRTOS-MPU implements exactly the property C4.3 names — bounding
      which kernel calls an unprivileged thread can issue. D=2: on the
      documented MPU posture this is the default behaviour for any task
      created without portPRIVILEGE_BIT; D is not 3 because the design choice
      to put a task in unprivileged mode is the integrator's, and the flat
      posture exposes everything. S=2: the SVC table plus the
      __syscalls_flash_start..end pin and the per-handle ACL stack provide
      strong, hardware-backed surface reduction, but the granularity is image-
      wide (every unprivileged task in the build sees the same syscall set —
      there is no per-task seccomp-bpf-style filter), and the privileged-side
      checks are conventional C code with no formal verification, so we stop
      short of S=3. A=3: the SVC trap, the syscall-flash linker section, and
      the v2 wrapper layer are foundational to the FreeRTOS-MPU port — not
      bolt-ons. T_age=3 (the SVC-mediated MPU surface and __syscalls_flash_*
      sections have been part of the Cortex-M MPU ports for many years; v2
      added the opaque-handle layer more recently), T_maintained=3
      (mpu_wrappers_v2.c and the CM33 port SVC paths receive ongoing fixes);
      T = min(3,3) = 3.
  C4.5:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        There is no insmod, modprobe, dlopen-into-kernel, or runtime code
        loading of any kind in FreeRTOS-Kernel V11.2.0. The build produces one
        ELF/binary that contains the kernel, the application, and any drivers as
        a single privileged-flash image (plus per-task unprivileged-flash
        sections on the MPU port). Without a loader path the entire C4.5 attack
        surface — 'load malicious kernel code at runtime' — does not exist.
    commits: []
    discussions: []
    rationale: |
      N/A by design — there is no kernel-module loading mechanism, so there
      is nothing to gate with signing, lockdown, or a securelevel-style
      monotonic switch. This mirrors the framework's N/A treatment of
      Fuchsia and Fiasco for the same mechanism
      ("no loadable module support"). Replacing kernel code requires
      reflashing the device image, which is a property of the boot/trust
      chain (C6) rather than a runtime privilege-boundary concern.
  C4.6:
    P: 1
    D: 2
    S: 2
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition)"
      - "portNUM_CONFIGURABLE_REGIONS (number of MemoryRegion_t slots a TaskParameters_t carries — 4 on most Cortex-M targets, 8 on Armv8-M)"
      - "configUSE_MPU_WRAPPERS_V1=0 (enables the per-task system-call stack and ACL bitmap)"
      source_files:
      - "sources/freertos/include/task.h:147 (TaskParameters_t: pvTaskCode, stack, xRegions[portNUM_CONFIGURABLE_REGIONS] of MemoryRegion_t — the analogue of a 'process descriptor with seccomp + memory regions' supplied at create time)"
      - "sources/freertos/tasks.c:1571 (xTaskCreateRestricted: calls prvCreateRestrictedTask, which programs xMPU_SETTINGS from the supplied MemoryRegion_t array before the new task ever runs)"
      - "sources/freertos/tasks.c (xMPU_SETTINGS embedded in TCB_t; loaded into MPU_RBAR/MPU_RLAR by vPortRestoreContextOfTask on each context switch)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c (prvSetupMPU + per-task region programming; per-task RAM regions are XN, RW only for the owning task)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (per-task system-call stack via xSystemCallStackInfo so one task's syscall execution cannot trample another's stack)"
      default_state: >-
        Each FreeRTOS-MPU task is its own isolation domain enforced by the
        Armv8-M MPU: it gets its own RW+XN task RAM region, optionally up to
        portNUM_CONFIGURABLE_REGIONS additional MemoryRegion_t slots (which the
        integrator typically uses to grant access to specific device peripherals
        or shared buffers), and — on v2 — its own kernel-side system-call stack
        and ulAccessControlList[] bitmap. The MPU is reprogrammed from
        xMPU_SETTINGS on every context switch, so a task cannot read or write
        another task's RAM or peripherals it was not granted. There is no
        analogue of Linux namespaces (no PID/net/mount namespace concept exists
        because there are no PIDs/networks/mounts in the kernel), and no
        FreeBSD-jail-style hierarchical container — the granularity is per-task
        MPU regions, configured statically at task-create time.
    commits:
    - hash: "4640196be"
      date: "2009-09-28"
      description: "Add CM3 MPU port."
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: the per-task isolation domain exists. D=2: enabled by default on
      the MPU posture for any task created with xTaskCreateRestricted /
      xTaskCreateRestrictedStatic; xTaskCreate also works under MPU but
      defaults to a single shared unprivileged region per task without the
      caller-customised MemoryRegion_t entries. S=2: the MPU hardware enforces
      the per-task region permissions and the kernel-private region keeps TCBs
      and scheduler state out of unprivileged reach, but the model is much
      coarser than Linux namespaces or FreeBSD jails — only a handful of
      configurable regions per task, no hierarchical isolation, no resource
      accounting per domain, and a single kernel address space shared by all
      privileged code, so a compromised privileged context escapes
      immediately. A=3: per-task MPU programming and the xMPU_SETTINGS slot
      inside TCB_t are foundational to FreeRTOS-MPU; xTaskCreateRestricted is
      not retrofitted on top of a flat scheduler. T_age=3 (MemoryRegion_t and
      xTaskCreateRestricted have been part of the MPU API for well over a
      decade), T_maintained=3 (the Armv8-M port and tasks.c restricted-task
      paths are actively maintained); T = min(3,3) = 3.
  C4.7:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        FreeRTOS tasks do not carry any user-identity metadata. TCB_t has no
        uid/gid/effective-uid fields; there is no setuid/seteuid equivalent, no
        exec boundary at which credentials could be inherited or dropped, no
        Yama-style PTRACE_SCOPE because there is no ptrace, and no SUID dumpable
        concept because there is no core-dump pipeline. The kernel does provide
        vPortResetPrivilege and the symmetric vPortRaisePrivilege, but those
        operate on the Armv8-M CONTROL.nPRIV bit of the currently running task
        rather than on any persistent credential; they are an MPU-mode privilege
        transition primitive, not a setuid-style credential operation. The C4.7
        attack surface — 'attacker uses ptrace/SUID/credential APIs to escalate'
        — does not exist.
    commits: []
    discussions: []
    rationale: |
      N/A — C4.7 hardens a Unix-shaped credential and process-relationship
      model (uid/gid, setuid, ptrace, parent-child inheritance) that
      FreeRTOS structurally does not have. There are no credentials to
      sanitise on exec because there is no exec; there is no ptrace API to
      gate with Yama; there is no SUID dumpable bit because there is no
      core-dump pipeline. The closest analogues — the privilege-raise
      gating in vSystemCallEnter, the per-task MPU regions, and the
      optional ACL bitmap — are scored under C4.3 (syscall surface
      reduction), C4.6 (process/resource isolation domains) and C4.2
      (capability-based access control) respectively, so scoring C4.7
      separately would double-count the same MPU mechanism. This matches
      Fuchsia's "no ptrace concept" framing and Fiasco's "no
      uid/gid in the kernel" treatment of the same mechanism.
  C4.8:
    P: 1
    D: 2
    S: 2
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition)"
      - "configUSE_MPU_WRAPPERS_V1 (both v1 and v2 perform the check; the check sits in vPortSVCHandler_C for v1 and in vSystemCallEnter for v2)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:1242 (vSystemCallEnter (v2): `if( ( ulSystemCallLocation >= ( uint32_t ) __syscalls_flash_start__ ) && ( ulSystemCallLocation <= ( uint32_t ) __syscalls_flash_end__ ) … )` — gates the entire syscall dispatch on the SVC PC being inside the carved region)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:1178 (vPortSVCHandler_C (v1) portSVC_RAISE_PRIVILEGE branch: same __syscalls_flash_start__/__syscalls_flash_end__ check before vRaisePrivilege)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (MPU_xFoo wrapper functions are tagged FREERTOS_SYSTEM_CALL so the linker places them in the __syscalls_flash_* section — they are the only legitimate origin for an SVC)"
      default_state: >-
        Every SVC trap from an unprivileged task is gated on the program counter
        of the SVC instruction being inside the linker-defined
        __syscalls_flash_start__..__syscalls_flash_end__ region, which contains
        only the kernel-supplied MPU_xFoo trampolines. A task gadget that
        executes its own `svc` instruction from inside its own
        unprivileged-flash text region fails the check, vSystemCallEnter /
        vPortSVCHandler_C returns without raising privilege, and the kernel
        dispatch never happens. This is the same defensive intent as OpenBSD's
        msyscall(2)/pinsyscalls — pinning the legitimate syscall-issuing
        addresses — applied to the FreeRTOS-MPU surface where 'libc' is replaced
        by the kernel-shipped wrapper stubs.
    commits:
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: the SVC origin check is implemented and exercised on every
      unprivileged syscall. D=2: enabled by default on the FreeRTOS-MPU
      posture; on flat mode the check is structurally inapplicable
      because there is no privilege boundary. S=2: the check is enforced
      by a privileged C predicate over the linker symbols
      __syscalls_flash_start__/__syscalls_flash_end__, so its strength is
      bounded by (a) the integrity of those linker symbols against a
      kernel-side write primitive and (b) the absence of an SVC
      instruction inside the carved region that the attacker could ROP
      to with attacker-controlled R0..R3. The check is hardware-backed in
      the sense that it relies on the architectural PC reading, but it is
      not as strong as msyscall(2)'s page-table-encoded pin and not as
      atomic as Fuchsia's vDSO mediation. A=3: an architectural property
      of FreeRTOS-MPU's SVC entry path, not an opt-in mitigation. T_age=3
      (the __syscalls_flash_* discipline has been in the port for many
      years; v2 reuses the same primitive), T_maintained=3 (mpu_wrappers
      and port SVC paths receive ongoing maintenance); T = min(3,3) = 3.
      Note that the underlying linker carve-out and MPU permission
      enforcement are shared with C1e.1 (W^X) and C1e.4 (PXN-equivalent);
      C4.8 scores the policy use of those primitives.
  C5a.1:
    P: 1
    D: 1
    S: 1
    A: 2
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition for any task-level isolation)"
      - "configENABLE_ACCESS_CONTROL_LIST (per-task allow-list of kernel objects, 0 by default; see include/FreeRTOS.h:83-85)"
      source_files:
      - "sources/freertos/tasks.c (xTaskCreateRestricted / xTaskCreateRestrictedStatic — the only API that turns a task into an MPU-confined 'driver'; integrator must opt in and supply the MemoryRegion_t entries pointing at the device MMIO range)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c (prvSetupMPU programs per-task regions on every context switch — region 0 stack guard, region 1 task RAM XN+RW, regions 2..N integrator-supplied)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (vGrantAccessToKernelObject / ulAccessControlList[] bitmap when configENABLE_ACCESS_CONTROL_LIST=1 — gates which kernel-object handles a 'driver' task may operate on)"
      - "sources/freertos/include/FreeRTOS.h:83-85 (configENABLE_ACCESS_CONTROL_LIST default 0)"
      default_state: >-
        On the flat (no-MPU) posture every driver runs at the same privilege as
        the scheduler, in one shared address space — a buggy driver corrupts
        every other task's stack and every kernel data structure (a property the
        C1e.5 entry already records). On the FreeRTOS-MPU posture there is a
        usable, but entirely opt-in, sandbox: an integrator can write a driver
        as a restricted task, give it only the MPU regions covering its MMIO and
        DMA buffers, and (with configENABLE_ACCESS_CONTROL_LIST=1) restrict
        which kernel objects it can touch. There is no built-in driver
        registration mechanism that would force this discipline, no
        restart-on-fault story, and DMA itself is unguarded because the Cortex-M
        memory bus has no IOMMU (see C5c.1).
    commits:
    - hash: "4640196be"
      date: "2009-09-28"
      description: "Add CM3 MPU port."
    - hash: "170a291d4"
      date: "2023"
      description: "Add Access Control List to MPU ports (#765)"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/765"
    rationale: |
      P=1: the MPU posture provides a real, hardware-enforced mechanism for
      confining a driver to its MMIO range, its DMA buffer, and a bounded
      syscall surface — this is materially more than the monolithic BSDs
      offer for kernel drivers. D=1: the property is opt-in at every step
      (configENABLE_MPU=1, xTaskCreateRestricted, MemoryRegion_t curation,
      optional configENABLE_ACCESS_CONTROL_LIST); the kernel ships no
      built-in driver model that would default a driver into the sandbox,
      and no FreeRTOS driver framework (FreeRTOS-Plus-TCP, the IDE
      examples) actually uses xTaskCreateRestricted in this way. S=1:
      hardware-enforced for the unprivileged-task case, but the moment the
      driver legitimately needs to enter privileged code (interrupt
      handler, peripheral register write that touches NVIC) it executes
      with full kernel privilege and the sandbox is gone — there is no
      driver-fault containment, no restart, no IOMMU backstop on DMA, and
      the integrator's discipline is the entire defence. A=2: the
      mechanism (MPU regions, ACL bitmap) is part of the in-tree port but
      the C5a.1 property itself (driver isolation as a design axis) is not
      something the kernel architecture commits to. T_age=3 / T_maintained=3
      → T=3: the underlying MPU/ACL primitives have been in the port for
      many years and remain actively maintained.
  C5a.2:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        There is no insmod/modprobe/dlopen-into-kernel path, no LKM ABI, no
        module ELF loader, no module sysfs. The build produces one
        privileged-flash image; updating any in-kernel logic requires reflashing
        the device.
    commits: []
    discussions: []
    rationale: |
      N/A — there is no runtime loadable module to isolate. Matches the
      framework's N/A treatment for Fuchsia, Fiasco, and OpenBSD on the same
      mechanism. 'Extending' the kernel means
      rebuilding the firmware image, which is a boot/trust-chain concern (C6)
      rather than a runtime sandbox concern.
  C5a.3:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files: []
      default_state: >-
        No eBPF, no uBPF, no Lua-in-kernel, no any other in-kernel interpreter
        or code generator. The kernel runs only the C code that was linked into
        the image at build time. Any scripting runtime, if present in an
        application task, lives in user (unprivileged-task) space and is outside
        the kernel TCB.
    commits: []
    discussions: []
    rationale: |
      N/A — no in-kernel VM to sandbox, so the C5a.3 attack surface is
      structurally absent. Matches the framework's treatment of
      OpenBSD/NetBSD/Fuchsia for the same mechanism.
  C5b.1:
    P:
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c (the kernel is the top of the privilege stack on the non-secure side; nothing above it can attest kernel text)"
      default_state: >-
        The Cortex-M (M-profile) architecture has no EL2 / no hypervisor
        execution level, so the standard 'hypervisor enforces kernel-text RO'
        design cannot exist on the same core. The TrustZone secure side (see
        C5b.2) is sometimes used to host attestation or runtime-integrity
        monitors in vendor stacks, but FreeRTOS-Kernel V11.2.0 itself ships no
        such monitor and no in-tree API to request one. On A-profile multi-core
        SoCs where FreeRTOS runs alongside Linux under a separate hypervisor,
        the guard would belong to that hypervisor, not to FreeRTOS — and is
        therefore not scored as a FreeRTOS-Kernel mechanism.
    commits: []
    discussions: []
    rationale: |
      N/A — the Cortex-M profile structurally lacks the EL2 / hypervisor
      execution level that HEKI/HVCI-style guards rely on, so the mechanism's
      substrate does not exist on the evaluation target; this is an
      architectural absence, not a gap a Kconfig flag could close. Tock and
      zephyr record the identical structural situation as na ("no hypervisor
      on Cortex-M"). The C6.4 'runtime kernel integrity' entry
      separately scores the in-kernel self-protection primitives (MPU RO+X on
      kernel flash) that survive without a hypervisor.
  C5b.2:
    P: 1
    D: 1
    S: 3
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_TRUSTZONE (default 1 on the ARM_CM33 port; see include/FreeRTOS.h:3021-3024)"
      - "configRUN_FREERTOS_SECURE_ONLY (default 0 — when 0, FreeRTOS is the non-secure scheduler and TrustZone is in effect; when 1, FreeRTOS itself runs in the secure world and the boundary is degenerate)"
      - "secureconfigMAX_SECURE_CONTEXTS (default 8; secure_context.c:67 — bounds the number of non-secure tasks that may concurrently hold a secure-side execution context)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/secure/secure_init.c:63 (SecureInit_DePrioritizeNSExceptions: programs SCB_AIRCR.PRIS so non-secure exceptions are de-prioritised relative to secure ones — secure-world IRQs cannot be pre-empted by non-secure)"
      - "sources/freertos/portable/GCC/ARM_CM33/secure/secure_context.c (per-task SecureContext_t pool: SecureContext_AllocateContext, SecureContext_LoadContext, SecureContext_FreeContext — separate secure-side PSP per non-secure task; stack-seal value 0xFEF5EDA5 placed at top and bottom of every secure stack to catch underflow/overflow per the Arm Cortex-M TrustZone guidance)"
      - "sources/freertos/portable/GCC/ARM_CM33/secure/secure_heap.c (dedicated secure-side allocator that backs SecureContext_AllocateContext; secure-side state is never exposed to vPortMalloc on the non-secure side)"
      - "sources/freertos/portable/GCC/ARM_CM33/secure/secure_port_macros.h (secureportNON_SECURE_CALLABLE attribute that marks the NSC entry-point veneers; secureportREAD_IPSR helper used to refuse secure-init requests from Thread Mode)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:1095-1163 (non-secure SVC dispatcher: portSVC_ALLOCATE_SECURE_CONTEXT and portSVC_FREE_SECURE_CONTEXT route into SecureContext_AllocateContext/SecureContext_FreeContext; portSVC_START_SCHEDULER calls SecureInit_DePrioritizeNSExceptions + SecureContext_Init)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/portasm.c:593 (vPortAllocateSecureContext: emits the SVC #portSVC_ALLOCATE_SECURE_CONTEXT instruction that crosses into the secure-side context manager)"
      default_state: >-
        On the ARM_CM33 port with configENABLE_TRUSTZONE=1 (the default) and
        configRUN_FREERTOS_SECURE_ONLY=0 (the default), FreeRTOS is the
        non-secure scheduler and the device is structurally divided by the
        SAU/IDAU into a secure world (which holds long-lived secrets and exposes
        only NSC veneers) and a non-secure world (which hosts the scheduler,
        tasks, drivers, and TCP/IP stack). The kernel itself does not own any
        secret material, but it integrates with the secure side in two
        load-bearing ways: (a) at vTaskStartScheduler it calls
        SecureInit_DePrioritizeNSExceptions so that the non-secure
        PendSV/SysTick cannot pre-empt secure-world execution, and (b) it
        manages per-task secure execution contexts (a private secure-side PSP,
        stack-sealed at 0xFEF5EDA5 per Arm's recommendation) so that when task A
        is mid-call into a secure NSC veneer and the scheduler context-switches
        to task B, task A's secure state is preserved instead of being
        overwritten by task B's secure call. The secure heap allocator that
        backs these contexts is a separate allocator in the secure world;
        non-secure code can never see it. There is no in-tree NTZ build for CM33
        (portable/GCC/ARM_CM33_NTZ/ exists as a flat comparator that
        intentionally omits the secure-side files); choosing that build is the
        integrator's way of opting out of the TEE story altogether.
    commits:
    - hash: "ce576f368"
      date: "2019"
      description: "First Official Release of ARMV8M Support."
    discussions: []
    rationale: |
      P=1: a real TEE-boundary integration ships in-tree (the entire
      portable/GCC/ARM_CM33/secure/ tree plus the dedicated secure-side
      SVC paths in non-secure/port.c). D=1 (not 2) because while
      configENABLE_TRUSTZONE defaults to 1 in the CM33 port, the property
      C5b.2 measures — actually placing key material on the secure side —
      requires an application-provided secure image with NSC veneers
      around the secrets; FreeRTOS-Kernel ships the scaffolding
      (SecureContext_*, SecureInit_*, secure_heap) but not the keys, so
      the out-of-box posture is "TrustZone wiring present, but no kernel
      secrets being protected". An integrator who follows the
      documentation and places, e.g., a TLS private key behind an NSC
      veneer gets full S=3 isolation; an integrator who ignores
      TrustZone gets nothing. S=3: when used as documented, the SAU/IDAU
      boundary is hardware-enforced — a non-secure-world memory corruption
      bug cannot read the secure-side heap or the secure-side stack of
      another task, and de-prioritising non-secure exceptions prevents a
      runaway non-secure scheduler from starving the secret-handling code.
      A=3: the secure-side runtime (SecureContext_*, the per-task
      SecureContext_t pool, the stack-seal discipline, the dedicated
      secure_heap.c) is part of the CM33 port itself, not an add-on. T_age=3
      / T_maintained=3 → T=3: the secure-side files have been in the
      kernel since the CM33 port was introduced and remain actively
      maintained. The honest caveat — that the *kernel* does not own
      secrets, only the framework — is the reason D is 1 rather than 2.
      Among the evaluated OSes this is the strongest TEE story by source-
      tree integration depth; Linux's trusted_keys + TPM and Fuchsia's
      TEE-relayed services achieve comparable runtime guarantees but
      neither bakes the secure-side runtime into the kernel image.
  C5c.1:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age:
    T_maintained:
    implementation:
      config_options: []
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/secure/secure_init.c (secure-side TrustZone runtime programs only AIRCR.PRIS and FPU access via NSACR/FPCCR — no SAU region setup, no peripheral security attribution; the repo contains zero SAU references, so flash/RAM/peripheral attribution is left to integrator startup code)"
      - "sources/freertos/portable/GCC/ARM_CM4_MPU/port.c (the only 'peripheral' regions are CPU-MPU regions over the 0x40000000-0x5FFFFFFF MMIO window, constraining CPU-issued accesses only; the Cortex-M CPU MPU does not police other bus masters)"
      default_state: >-
        The Armv8-M architecture has no system MMU and no IOMMU. The CPU MPU
        only constrains CPU-issued accesses; any DMA-capable peripheral (DMA
        controllers, Ethernet MAC, USB) writes the address it was programmed
        with directly onto AHB/AXI, bypassing the MPU. Vendor SoCs ship
        peripheral firewalls (STM32 GTZC, Nordic SPU, NXP/Microchip MPC) and the
        SAU can attribute peripheral ranges secure/non-secure, but all of that
        is vendor HAL/board/integrator code — the kernel itself has no firewall
        driver, no SAU programming, no DMA-mapping API, and no
        dma_alloc_coherent-equivalent.
    commits: []
    discussions: []
    rationale: |
      P=0: the abstract property is bounding device/DMA-master access, and
      that attack surface is real on Cortex-M: DMA controllers, the Ethernet
      MAC, and USB controllers are independent bus masters that bypass the
      CPU MPU entirely. A "no IOMMU, so non-existent surface" reading would
      conflate the strong IOMMU-class variant with the mechanism class as a
      whole: (1) the DMA-bypass surface exists regardless of whether an IOMMU
      does, and (2) zephyr ships SPU/GTZC peripheral partitioning in-tree,
      proving the peripheral-firewall variant is deliverable by an MCU OS.
      Verified in tree: the secure runtime (secure_init.c) never touches the
      SAU; the MPU ports place only CPU-side regions over the MMIO window;
      there is no peripheral-firewall driver or DMA-mapping API. Where such
      firewalls are configured on real boards it is vendor HAL/startup code,
      outside the evaluated artifact — the same artifact-boundary convention
      applied to C6.1/C6.2 (delegation to SoC ROM / vendor code is an absence
      of an OS-level mechanism, not inapplicability). D=S=A=T=0 follow from
      P=0.
  C5c.2:
    P: 1
    D: 2
    S: 2
    A: 3
    T_age: 3
    T_maintained: 3
    implementation:
      config_options:
      - "configENABLE_MPU=1 (precondition; default 0)"
      - "portNUM_CONFIGURABLE_REGIONS (typically 8 on Armv8-M, configurable; see port.c MPU programming)"
      - "configUSE_MPU_WRAPPERS_V1=0 (selects the v2 wrappers; v2 adds a per-task system-call stack and the optional ACL bitmap)"
      - "configENABLE_ACCESS_CONTROL_LIST (0 by default; when 1, per-task ulAccessControlList[] bitmap further restricts which kernel objects each task may use)"
      source_files:
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c (prvSetupMPU / prvSetupDefaultMPU: programs region 0 stack guard, region 1 task RAM XN+RW, regions 2..N integrator-supplied per-task regions on every context switch)"
      - "sources/freertos/tasks.c (xMPU_SETTINGS embedded inside TCB_t; loaded into MPU registers on context switch via vPortRestoreContextOfTask)"
      - "sources/freertos/portable/Common/mpu_wrappers_v2.c (per-task system-call stack via xSystemCallStackInfo, plus ulAccessControlList[] when configENABLE_ACCESS_CONTROL_LIST=1)"
      - "sources/freertos/include/task.h (TaskParameters_t.xRegions[portNUM_CONFIGURABLE_REGIONS] — the user-facing per-task region table supplied at xTaskCreateRestricted time)"
      default_state: >-
        On the FreeRTOS-MPU posture the MPU is the architectural primitive for
        intra-task isolation. Each task gets its own MemoryRegion_t[] enforced
        by the MPU on every context switch — a task can only read/write the RAM
        and MMIO regions enumerated for it, and any access outside those regions
        traps as a MemManage fault. Compared with the BULKHEAD design point
        (PKS-based domains inside a single PMD on x86), the FreeRTOS MPU
        equivalent is coarser (handful of regions per task, region permissions
        are static once programmed) but strictly hardware-enforced rather than
        relying on a software invariant. Privileged code shares one address
        space, so the property only constrains lateral movement at the
        unprivileged-task level; once an attacker is in privileged mode the MPU
        is fully reprogrammable. On the flat (no-MPU) posture there are no
        protection domains at all.
    commits:
    - hash: "ce576f368"
      date: "2019"
      description: "First Official Release of ARMV8M Support."
    - hash: "97050a17a"
      date: "2023-07-13"
      description: "Memory Protection Unit (MPU) Enhancements (#705) — introduces mpu_wrappers_v2 with opaque kernel object handles, per-task privileged syscall stack, and memory bounds checks (xPortIsAuthorizedToAccessBuffer). Shipped in V10.6.0"
    discussions:
    - "https://github.com/FreeRTOS/FreeRTOS-Kernel/pull/705"
    rationale: |
      P=1: per-task MPU domains are implemented and exercised on every
      context switch. D=2: enabled by default on the FreeRTOS-MPU posture
      for any task created via xTaskCreateRestricted; the broader posture
      itself is opt-in (configENABLE_MPU=1) which is why D is not 3. S=2:
      hardware-enforced for unprivileged tasks, with the ACL bitmap layered
      on top for kernel-object access — but the privileged side is one
      shared domain, the region count per task is small (typically 8),
      regions are statically sized at task-create time (not dynamically
      grown the way Linux PKS keys are), and there is no compartment-switch
      cost story (the MPU is reprogrammed wholesale on every context
      switch, which is the same cost whether you use intra-task isolation
      or not). A=3: per-task MPU programming and xMPU_SETTINGS-in-TCB are
      foundational properties of the FreeRTOS-MPU port, not a bolt-on; the
      same primitive backs C1e.1, C1e.4, C1e.5, C4.6, and C5d.2. T_age=3 /
