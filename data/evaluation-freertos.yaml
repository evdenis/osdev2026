      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/portmacrocommon.h:131-141 (vApplicationGenerateTaskRandomPacKey() prototype; user must provide an RNG-backed implementation)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/portmacrocommon.h:240-348 (MAX_CONTEXT_SIZE arithmetic adds a 16-word TaskPacKey slot to each TCB context layout when configENABLE_PAC==1)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:384-393 (portCONTROL_UPAC_EN / portCONTROL_PAC_EN bit definitions)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:1549-1602 (per-task PAC key generation in pxPortInitialiseStack: vApplicationGenerateTaskRandomPacKey() populates ulTaskPacKey[4] which is then stored in the TCB context)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:2249-2281 (prvConfigurePACBTI: sets PAC_EN | UPAC_EN in CONTROL and msr-writes it at scheduler start)"
