      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:949-957 (unprivileged flash: portMPU_REGION_READ_ONLY, executable)"
      - "sources/freertos/portable/GCC/ARM_CM33/non_secure/port.c:969-977 (privileged RAM: portMPU_REGION_PRIVILEGED_READ_WRITE | portMPU_REGION_EXECUTE_NEVER)"
