      mechanism exists in mainline Linux. The kernel relies on self-imposed restrictions
      (Lockdown LSM, C6.4) rather than external enforcement from a hypervisor layer.
  C5b.2:
    P: 0
    D: 0
    S: 0
    A: 0
    T_age: 0
    T_maintained: 0
    implementation:
