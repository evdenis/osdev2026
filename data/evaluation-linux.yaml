        and AMD-Vi (CONFIG_AMD_IOMMU=y), via CONFIG_IOMMU_SUPPORT=y. CONFIG_IOMMU_DMA=y
        (def_bool on ARM64 || X86 || S390, drivers/iommu/Kconfig:154) and CONFIG_IOMMU_SVA=y
