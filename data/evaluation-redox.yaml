      - "sources/redox/src/scheme/proc.rs:1-50 (proc: scheme — process manager; supports tracing and cross-process memory access)"
      - "sources/redox/src/scheme/memory.rs:230-240 (memory: scheme — uid!=0 calls rejected)"
