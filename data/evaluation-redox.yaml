  C4.6:
    P: 1
    D: 3
    S: 2
    A: 3
    T_age: 2
    T_maintained: 3
    implementation:
      config_options: []
      source_files:
      - "sources/redox-book/src/boot-process.md:33-52 (three namespaces — null, root, additional per-user — with enumerated scheme lists)"
      - "sources/redox/src/scheme/mod.rs:215-334 (SchemeList.insert reserves scheme ids, uid==0 required to create new ones)"
      - "sources/redox/src/context/memory.rs:86-132 (per-context AddrSpaceWrapper)"
      default_state: >-
        Isolation domain = (Context, AddrSpace, Namespace, FdTbl). Address
        spaces are unconditionally separate per Context — there is no
        equivalent of `CLONE_VM` that would share kernel views. Namespaces
        partition the scheme list so that e.g. a PCI driver in the `null`
        namespace cannot see `file:`, `tcp:`, etc. Unlike Linux namespaces,
        there is no fine-grained namespace-per-resource (mount ns, pid ns,
        user ns) — the granularity is the scheme list.
    commits:
    - hash: "244069cf"
      date: "2017-10-09"
      description: "Implement a capability namespace with no available schemes (the null namespace: a context can be confined to a scheme list containing nothing)"
    - hash: "5ac00f55"
