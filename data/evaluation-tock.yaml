default_config: "Tock master @ aa1281a (2026-05) on nRF52840 (ARM Cortex-M4F + ARMv7-M MPU; nrf52840dk / micro:bit v2 / nano33ble), arm-none-eabi + pinned-nightly Rust; entire kernel and all drivers (capsules) written in Rust, applications run as separate MPU-isolated unprivileged processes over a fixed 8-class syscall ABI; no general-purpose kernel heap (grant region allocated from process RAM). Selected as the representative Cortex-M + MPU peer of the FreeRTOS/Contiki-NG/Zephyr/NuttX evaluations."
comparator_configs:
- "OpenTitan (lowRISC Ibex RV32IMC + ePMP, boards/opentitan/earlgrey-cw310): EarlGreyEPMP with machine-mode lockdown gives privilege-differentiated execute (C1e.4 SMEP analogue) and execute-only memory (C1e.6) that the Cortex-M MPU cannot express, plus a silicon root-of-trust secure-boot chain — the upper bound for C1e/C5/C6."
- "LPC55S69-EVK (Cortex-M33 + TrustZone-M + ARMv8-M MPU): hardware parity with the M33-based RTOS evaluations. Tock leaves TrustZone-M UNUSED (relies on MPU + Rust + capabilities), so C5b.2 stays P=0 even where the silicon supports a secure world — a deliberate architectural contrast with Zephyr/NuttX/Contiki-NG."

