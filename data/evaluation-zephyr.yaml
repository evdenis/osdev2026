    commits: []
    discussions: []
    rationale: |
      N/A — Zephyr's kernel object (kobject) system does not use reference
      counting for object lifetime management. struct k_object
      (include/zephyr/sys/internal/kobject_internal.h:61-66) uses a permission
      bitmap (perms[CONFIG_MAX_THREAD_BYTES]) rather than a reference count.
      Kernel objects are statically allocated or explicitly freed; there is no
      refcount integer that could overflow and trigger UAF. The CWE-190/416
      attack surface does not apply in this form.
